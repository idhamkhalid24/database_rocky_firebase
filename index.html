  <style>
    :root{

    [data-theme="light"]{

      --accent2:#5b8fff; --green:#18a96b; --red:#e84545; --amber:#d98708; --shadow:0 18px 45px rgba(22,35,60,.10);

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .wrap{width:min(1180px,100%);margin:0 auto;padding:18px}
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:22px}
    .login-card{width:min(420px,100%);background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:26px;padding:26px;box-shadow:var(--shadow)}
    .logo{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#818cf8);display:grid;place-items:center;font-size:28px;margin:0 0 18px;color:white}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg),rgba(10,13,20,.72));backdrop-filter:blur(18px);z-index:20;padding:10px 0 14px}

    h1{margin:0;font-size:25px;line-height:1.05;letter-spacing:-.04em}
    .sub{color:var(--muted);font-size:12.5px;margin-top:4px}
    .nav{display:flex;gap:8px;overflow:auto;padding:2px 0 10px;margin-bottom:10px;scrollbar-width:none}
    .nav::-webkit-scrollbar{display:none}
    .tab{border:1px solid var(--border);background:var(--bg2);color:var(--muted);border-radius:14px;padding:10px 13px;font-weight:800;font-size:12px;display:flex;align-items:center;gap:7px;white-space:nowrap}

    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;box-shadow:0 1px 0 rgba(255,255,255,.03);overflow:hidden}
    .card-pad{padding:16px}
    .hero{background:linear-gradient(145deg,var(--bg3),var(--bg2));border-radius:22px;border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
    .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ghost);font-weight:900;margin-bottom:5px}
    .metric-value{font-size:24px;font-weight:900;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
    .input, .select, .textarea{width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:13px;padding:11px 12px;outline:none;min-height:42px}

    .btn{border:none;border-radius:13px;padding:11px 13px;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.12s ease;white-space:nowrap}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 10px 25px rgba(91,143,255,.22)}
    .btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}
    .btn-danger{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.24)}
    .btn-green{background:rgba(82,216,158,.14);color:var(--green);border:1px solid rgba(82,216,158,.24)}
    .btn-amber{background:rgba(255,196,107,.13);color:var(--amber);border:1px solid rgba(255,196,107,.25)}
    .btn-sm{padding:8px 9px;border-radius:10px;font-size:12px}
    .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .spaced{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .list{display:flex;flex-direction:column;gap:8px}
    .item{border:1px solid var(--border);background:var(--bg2);border-radius:16px;padding:13px;display:flex;gap:12px;justify-content:space-between;align-items:flex-start}
    .item-main{min-width:0;flex:1}
    .title{font-weight:900;letter-spacing:-.02em;line-height:1.35}
    .meta{font-size:12px;color:var(--muted);line-height:1.55;margin-top:3px;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--border);background:var(--surface);color:var(--muted)}
    .pill.green{background:rgba(82,216,158,.12);color:var(--green);border-color:rgba(82,216,158,.24)}
    .pill.red{background:rgba(255,107,107,.12);color:var(--red);border-color:rgba(255,107,107,.24)}
    .pill.amber{background:rgba(255,196,107,.13);color:var(--amber);border-color:rgba(255,196,107,.25)}
    .pill.blue{background:rgba(91,143,255,.14);color:var(--accent);border-color:rgba(91,143,255,.25)}
    .muted{color:var(--muted)}
    .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:18px;background:var(--surface)}
    #toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-12px);opacity:0;z-index:1000;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:11px 16px;font-weight:800;box-shadow:var(--shadow);transition:.22s ease;max-width:calc(100% - 28px);text-align:center}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #loading{position:fixed;inset:0;background:rgba(5,8,16,.68);backdrop-filter:blur(14px);z-index:900;display:none;place-items:center;color:white;font-weight:900}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.16);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    .danger-zone{border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.06)}
    .table-scroll{overflow:auto;border:1px solid var(--border);border-radius:16px}.mini-table{width:100%;border-collapse:collapse;min-width:700px;background:var(--bg2)}.mini-table th,.mini-table td{padding:11px 12px;border-bottom:1px solid var(--border);text-align:left;font-size:12px;vertical-align:top}.mini-table th{color:var(--ghost);text-transform:uppercase;letter-spacing:.08em;font-size:10px}.mini-table tr:last-child td{border-bottom:none}
    @media(max-width:820px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.topbar{align-items:flex-start}.topbar-actions{display:flex;flex-direction:column;width:auto}.item{flex-direction:column}.item-actions{width:100%;display:flex;overflow:auto}.item-actions .btn{flex:1}.wrap{padding:12px}.card-pad{padding:13px}h1{font-size:22px}}

  function wibParts(ms = Date.now()){
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone:'Asia/Jakarta', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).formatToParts(new Date(ms));
    const get = type => parts.find(p => p.type === type)?.value || '00';
    return { y:get('year'), m:get('month'), d:get('day'), h:get('hour'), min:get('minute'), s:get('second') };
  }
  function dateKey(ms = Date.now()){ const p = wibParts(ms); return `${p.y}-${p.m}-${p.d}`; }
  function monthKeyFromDateKey(dk){ return String(dk || '').slice(0,7); }
  function timeKey(ms = Date.now()){ const p = wibParts(ms); return `${p.h}:${p.min}`; }
  function parseWibMs(dk, tm='00:00'){
    if (!dk) return Date.now();
    const [hh='00', mm='00'] = String(tm || '00:00').split(':');
    const ms = new Date(`${dk}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00+07:00`).getTime();
    return Number.isFinite(ms) ? ms : Date.now();
  }
  function recMs(r){
    if (!r) return 0;
    if (Number(r.createdAtMs)) return Number(r.createdAtMs);
    if (r.createdAt?.seconds) return Number(r.createdAt.seconds) * 1000;
    if (r.closedAtMs) return Number(r.closedAtMs);
    if (r.deletedAtMs) return Number(r.deletedAtMs);
    return 0;
  }
  function fmtDateTime(ms){ return ms ? new Date(ms).toLocaleString('id-ID', { timeZone:'Asia/Jakarta', hour12:false }) : '-'; }
  function sortDesc(list){ return [...list].sort((a,b)=>recMs(b)-recMs(a)); }
  function isDeleted(r){ return r?.deleted === true || r?.deleted === 'true'; }

  async function login(){
    const username = sanitizeUsername($('login-user').value);

    if(!username || !pin) return toast('Isi username dan PIN dulu', true);
    setLoading(true);
    try{

      if(!snap.exists()) throw new Error('User tidak ditemukan');
      const u = { id:snap.id, ...snap.data() };
      if(!isActiveUser(u)) throw new Error('User nonaktif');
      if(String(u.pin || '') !== pin) throw new Error('PIN salah');
      if(!isAdminUser(u)) throw new Error('Aplikasi manager ini khusus admin');
      state.currentUser = { username:sanitizeUsername(u.username || username), name:u.name || username, pin:String(u.pin || ''), role:u.role || 'staff' };
      localStorage.setItem(SESSION_KEY, JSON.stringify(state.currentUser));
      await bindData();
      state.tab = 'dashboard';
      render();
      toast(`Masuk sebagai ${state.currentUser.name}`);
    }catch(e){ toast(e.message || 'Login gagal', true); }
    setLoading(false);

    state.currentUser = null;

  async function bindData(){
    state.unsub.forEach(fn => { try{ fn(); }catch(e){} });
    state.unsub = [];
    const watch = (ref, apply, label) => {
      const unsub = onSnapshot(ref, snap => { apply(snap); state.ready = true; renderContentOnly(); }, err => { console.error(label, err); toast(`Gagal sync ${label}: ${err.message}`, true); });
      state.unsub.push(unsub);
    };
    watch(collection(db,'users'), snap => state.users = snap.docs.map(d=>({id:d.id,...d.data()})), 'users');
    watch(query(collection(db,'transactions'), limit(2500)), snap => state.transactions = sortDesc(snap.docs.map(d=>({id:d.id,...d.data()}))), 'transactions');
    watch(query(collection(db,'attendance'), limit(2500)), snap => state.attendance = sortDesc(snap.docs.map(d=>({id:d.id,...d.data()}))), 'attendance');
    watch(query(collection(db,'closings'), limit(600)), snap => state.closings = sortDesc(snap.docs.map(d=>({id:d.id,...d.data()}))), 'closings');
    watch(query(collection(db,'audit_logs'), limit(500)), snap => state.logs = sortDesc(snap.docs.map(d=>({id:d.id,...d.data()}))), 'audit_logs');
    const bonusSnap = await getDoc(doc(db,'closings','__bonus_settings'));
    if(bonusSnap.exists()) state.bonus = { ...state.bonus, ...bonusSnap.data() };
    const bonusUnsub = onSnapshot(doc(db,'closings','__bonus_settings'), snap => { if(snap.exists()) state.bonus = { ...state.bonus, ...snap.data() }; renderContentOnly(); });
    state.unsub.push(bonusUnsub);
  }

  function last7RevenueData(activeTx){
    const now = Date.now();
    const keys = [];
    for(let i=6;i>=0;i--) keys.push(dateKey(now - i * 86400000));
    const sums = Object.fromEntries(keys.map(k => [k, 0]));
    activeTx.forEach(t => {
      const k = String(t.dateKey || '').slice(0,10);
      if(Object.prototype.hasOwnProperty.call(sums, k)) sums[k] += Number(t.amount || 0) || 0;
    });
    return keys.map(k => {
      const dt = new Date(`${k}T00:00:00+07:00`);
      const day = new Intl.DateTimeFormat('id-ID', { timeZone:'Asia/Jakarta', weekday:'short' }).format(dt).replace('.', '');
      return { key:k, day, date:k.slice(8,10), total:sums[k] || 0 };
    });
  }
  function miniMoney(n){
    n = Number(n || 0);
    if(n >= 1000000000) return (n/1000000000).toFixed(n >= 10000000000 ? 0 : 1).replace('.', ',') + 'M';
    if(n >= 1000000) return (n/1000000).toFixed(n >= 10000000 ? 0 : 1).replace('.', ',') + 'jt';
    if(n >= 1000) return Math.round(n/1000) + 'rb';
    return String(Math.round(n));
  }
  function revenueChartHtml(activeTx){
    const data = last7RevenueData(activeTx);
    const total = data.reduce((a,b)=>a+b.total,0);
    const max = Math.max(...data.map(d=>d.total), 1);
    const avg = Math.round(total / 7);
    return `<div class="card card-pad rev-card">
      <div class="rev-head">
        <div><div class="metric-label">Grafik Pendapatan 7 Hari Terakhir</div><div class="rev-total">Rp ${formatRupiah(total)}</div><div class="meta">Rata-rata: Rp ${formatRupiah(avg)} / hari</div></div>

  async function saveUser(){
    if(!isAdmin()) return toast('Hanya admin', true);
    const username = sanitizeUsername($('user-username').value);
    const name = String($('user-name').value || '').trim();
    const pin = String($('user-pin').value || '').trim();
    const role = String($('user-role').value || 'staff').toLowerCase();
    const dailyBonusPercent = Number(String($('user-daily').value || '0').replace(',','.')) || 0;
    const active = $('user-active').checked;
    if(!/^[a-z0-9_-]{3,30}$/.test(username)) return toast('Username min 3, huruf kecil/angka/_/-', true);
    if(!name || !pin) return toast('Nama dan PIN wajib diisi', true);
    if(!['admin','staff','harian'].includes(role)) return toast('Role tidak valid', true);
    if(dailyBonusPercent < 0 || dailyBonusPercent > 100) return toast('Bonus harian harus 0-100%', true);
    setLoading(true);
    try{
      const ref = doc(db,'users',username);
      const snap = await getDoc(ref);
      await setDoc(ref, { username, name, pin, role, dailyBonusPercent: role==='harian'?dailyBonusPercent:0, dailyBonusRate: role==='harian'?dailyBonusPercent/100:0, active, deleted: !active, updatedAt:serverTimestamp(), updatedAtMs:Date.now(), updatedBy:state.currentUser.username, createdAt: snap.exists() ? (snap.data().createdAt || serverTimestamp()) : serverTimestamp() }, { merge:true });
      await logAudit('user_upsert_data_manager', { username, role, active, existed:snap.exists() });
      clearUserForm(); toast(snap.exists()?'User diperbarui':'User ditambahkan');
    }catch(e){ toast(e.message || 'Gagal simpan user', true); }
    setLoading(false);
  }

  function filteredTransactions(){
    const f=state.filters; const q=f.q.toLowerCase();
    return state.transactions.filter(t => {
      if(f.user !== 'all' && sanitizeUsername(t.user) !== sanitizeUsername(f.user)) return false;
      if(f.status === 'active' && isDeleted(t)) return false;
      if(f.status === 'deleted' && !isDeleted(t)) return false;
      const dk = String(t.dateKey || '').slice(0,10);
      if(f.start && dk && dk < f.start) return false;
      if(f.end && dk && dk > f.end) return false;
      if(q && !JSON.stringify(t).toLowerCase().includes(q)) return false;
      return true;
    });
  }

  function closingItemHtml(c){ const closed=c.closed===true; const canceled=c.canceled===true; return `<div class="item ${canceled?'danger-zone':''}"><div class="item-main"><div class="row"><span class="title">${escapeHtml(c.dateKey || c.id)}</span><span class="pill ${closed?'green':'amber'}">${closed?'closed':'open'}</span>${canceled?'<span class="pill red">canceled</span>':''}<span class="pill blue">${escapeHtml(c.scope || (c.user?'user':'global'))}</span></div><div class="meta">${c.user?escapeHtml(userLabel(c.user)):'Global'} · Jam: ${escapeHtml(c.closingTime || c.actualClosingTime || '-')} · Bonus: Rp ${formatRupiah(c.totalBonus || 0)}<br>ID: ${escapeHtml(c.id)}</div></div><div class="row item-actions"><button class="btn btn-ghost btn-sm" onclick="editClosing(${jsArg(c.id)})"><i class="fas fa-pen"></i></button><button class="btn btn-danger btn-sm" onclick="hardDeleteRecord('closings',${jsArg(c.id)})"><i class="fas fa-trash"></i></button></div></div>`; }
  async function saveClosing(){ const oldId=$('closing-id').value.trim(); const dk=$('closing-date').value||dateKey(); const tm=$('closing-time').value||timeKey(); const scope=$('closing-scope').value; const user=scope==='user'?sanitizeUsername($('closing-user').value):''; const id=oldId || closingDocId(dk,user); const ms=parseWibMs(dk,tm); const delay=closingDelayFromTime(tm); const bonusPerMinute=Number(state.bonus.closingBonusPerMinute || DEFAULT_CLOSING_BONUS_PER_MINUTE); const totalBonus=delay*bonusPerMinute; const payload={dateKey:dk,scope,user:user||null,closed:$('closing-closed').checked,canceled:$('closing-canceled').checked,closingTime:tm,actualClosingTime:tm,delayMinutes:delay,bonusPerUser:totalBonus,totalBonus,closedAt:Timestamp.fromMillis(ms),closedAtMs:ms,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.currentUser.username,updatedByName:state.currentUser.name}; setLoading(true); try{ if(oldId && oldId!==id) await deleteDoc(doc(db,'closings',oldId)); await setDoc(doc(db,'closings',id),payload,{merge:true}); await logAudit('closing_upsert_data_manager',{id,dateKey:dk,scope,user:user||null}); clearClosingForm(); toast('Closing disimpan'); }catch(e){ toast(e.message||'Gagal simpan closing',true); } setLoading(false); }
  function editClosing(id, fromModal=false){ if(!fromModal) return openClosingModal(id); const c=state.closings.find(x=>x.id===id); if(!c) return; $('closing-id').value=c.id; $('closing-date').value=c.dateKey||dateKey(); $('closing-time').value=c.closingTime||c.actualClosingTime||timeKey(recMs(c)||Date.now()); $('closing-scope').value=c.user?'user':'global'; $('closing-user').value=sanitizeUsername(c.user||''); $('closing-closed').checked=c.closed===true; $('closing-canceled').checked=c.canceled===true; }
  function clearClosingForm(close=true){ ['closing-id'].forEach(id=>{const el=$(id); if(el) el.value='';}); const d=$('closing-date'); if(d) d.value=dateKey(); const tm=$('closing-time'); if(tm) tm.value=timeKey(); const s=$('closing-scope'); if(s) s.value='global'; const u=$('closing-user'); if(u && activeUsers()[0]) u.value=activeUsers()[0].username; const cl=$('closing-closed'); if(cl) cl.checked=true; const ca=$('closing-canceled'); if(ca) ca.checked=false; if(close) closeFormModal(); }

  function bonusHtml(){ const trxPercent=Number(state.bonus.transactionBonusRate||0)*100; const closing=Number(state.bonus.closingBonusPerMinute||0); return `<div class="card card-pad"><div class="metric-label">Bonus Settings</div><div class="title">Atur Bonus Global</div><div class="grid grid-2" style="margin-top:14px"><div class="field"><label>Bonus transaksi (%)</label><input id="bonus-trx" class="input" type="number" step="0.01" value="${trxPercent}"></div><div class="field"><label>Bonus closing per menit (Rp)</label><input id="bonus-closing" class="input" type="number" step="1" value="${closing}"></div></div><div class="row" style="margin-top:14px"><button class="btn btn-primary" onclick="saveBonus()"><i class="fas fa-floppy-disk"></i> Simpan Bonus</button><span class="pill blue">Update: ${escapeHtml(fmtDateTime(Number(state.bonus.updatedAtMs||0)))}</span></div></div>`; }
  async function saveBonus(){ const pct=Number($('bonus-trx').value||0); const closing=Number($('bonus-closing').value||0); if(pct<0 || pct>100 || closing<0) return toast('Nilai bonus tidak valid',true); setLoading(true); try{ await setDoc(doc(db,'closings','__bonus_settings'),{type:'bonus_settings',transactionBonusRate:pct/100,closingBonusPerMinute:closing,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.currentUser.username,updatedByName:state.currentUser.name},{merge:true}); await logAudit('bonus_settings_update_data_manager',{transactionBonusPercent:pct,closingBonusPerMinute:closing}); toast('Bonus disimpan'); }catch(e){ toast(e.message||'Gagal simpan bonus',true); } setLoading(false); }

  function rawHtml(){ return `<div class="grid grid-2"><div class="card card-pad"><div class="metric-label">Raw JSON Editor</div><div class="title">Edit dokumen Firestore langsung</div><div class="meta">Pakai ini kalau ada field yang belum tersedia di form. Timestamp akan disimpan sebagai nilai biasa kecuali memakai tombol form tab lain.</div><div class="grid" style="margin-top:14px"><div class="grid grid-2"><div class="field"><label>Collection</label><select id="raw-col" class="select"><option>users</option><option>transactions</option><option>attendance</option><option>closings</option><option>audit_logs</option></select></div><div class="field"><label>Document ID</label><input id="raw-id" class="input" placeholder="kosong = addDoc"></div></div><div class="row"><button class="btn btn-ghost" onclick="loadRawDoc()"><i class="fas fa-download"></i> Load</button><button class="btn btn-primary" onclick="saveRawDoc()"><i class="fas fa-floppy-disk"></i> Simpan JSON</button><button class="btn btn-danger" onclick="deleteRawDoc()"><i class="fas fa-trash"></i> Hapus</button></div></div></div><div class="card card-pad"><div class="field"><label>JSON</label><textarea id="raw-json" class="textarea" placeholder='{"field":"value"}'></textarea></div></div></div>`; }
  async function loadRawDoc(){ const col=$('raw-col').value; const id=$('raw-id').value.trim(); if(!id) return toast('Isi Document ID untuk load',true); setLoading(true); try{ const s=await getDoc(doc(db,col,id)); if(!s.exists()) throw new Error('Dokumen tidak ditemukan'); $('raw-json').value=JSON.stringify(s.data(), null, 2); toast('Dokumen dimuat'); }catch(e){ toast(e.message||'Gagal load',true); } setLoading(false); }
  async function saveRawDoc(){ const col=$('raw-col').value; const id=$('raw-id').value.trim(); let data; try{ data=JSON.parse($('raw-json').value || '{}'); }catch(e){ return toast('JSON tidak valid',true); } setLoading(true); try{ if(id) await setDoc(doc(db,col,id),{...data,updatedAtMs:Date.now(),updatedBy:state.currentUser.username},{merge:true}); else { const r=await addDoc(collection(db,col),{...data,createdAtMs:Date.now(),createdBy:state.currentUser.username}); $('raw-id').value=r.id; } await logAudit('raw_json_save_data_manager',{collection:col,id:id||$('raw-id').value}); toast('JSON disimpan'); }catch(e){ toast(e.message||'Gagal simpan JSON',true); } setLoading(false); }
  async function deleteRawDoc(){ const col=$('raw-col').value; const id=$('raw-id').value.trim(); if(!id) return toast('Isi Document ID',true); const pin=prompt(`Hapus permanen ${col}/${id}?\nMasukkan PIN admin:`); if(!pin || pin !== String(state.currentUser.pin)) return toast('PIN salah / batal',true); setLoading(true); try{ await deleteDoc(doc(db,col,id)); await logAudit('raw_json_delete_data_manager',{collection:col,id}); $('raw-json').value=''; toast('Dokumen dihapus'); }catch(e){ toast(e.message||'Gagal hapus dokumen',true); } setLoading(false); }

  function backupHtml(){ return `<div class="grid grid-2"><div class="card card-pad"><div class="metric-label">Export</div><div class="title">Download backup JSON</div><div class="meta">Berisi users, transactions, attendance, closings, audit_logs, dan bonus settings dari cache realtime saat ini.</div><button class="btn btn-primary" style="margin-top:14px" onclick="downloadBackup()"><i class="fas fa-file-arrow-down"></i> Download Backup</button></div><div class="card card-pad danger-zone"><div class="metric-label">Import ringan</div><div class="title">Restore JSON Data Manager</div><div class="meta">Import akan menambahkan/update dokumen. Untuk transaksi/absensi tanpa ID akan dibuat dokumen baru. Gunakan hati-hati.</div><input id="backup-file" type="file" class="input" accept="application/json" style="margin-top:14px"><button class="btn btn-amber" style="margin-top:10px" onclick="importBackup()"><i class="fas fa-file-import"></i> Import Backup</button></div></div>`; }
  function downloadBackup(){ const payload={version:'rocky-data-manager-1',exportedAt:new Date().toISOString(),data:{users:state.users,transactions:state.transactions,attendance:state.attendance,closings:state.closings,audit_logs:state.logs,bonus_settings:state.bonus}}; const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`rocky-backup-${dateKey()}.json`; a.click(); URL.revokeObjectURL(url); }
  async function importBackup(){ const file=$('backup-file')?.files?.[0]; if(!file) return toast('Pilih file JSON dulu',true); const pin=prompt('Import data ke Firebase? Masukkan PIN admin:'); if(!pin || pin!==String(state.currentUser.pin)) return toast('PIN salah / batal',true); setLoading(true); try{ const payload=JSON.parse(await file.text()); const data=payload.data || payload; const upsertMany=async(col,items)=>{ if(!Array.isArray(items)) return 0; let n=0; for(const it of items){ const id=it.id || it.username || ''; const clean={...it}; delete clean.id; if(id) await setDoc(doc(db,col,String(id)),clean,{merge:true}); else await addDoc(collection(db,col),clean); n++; } return n; }; const counts={ users:await upsertMany('users',data.users), transactions:await upsertMany('transactions',data.transactions), attendance:await upsertMany('attendance',data.attendance), closings:await upsertMany('closings',data.closings), audit_logs:await upsertMany('audit_logs',data.audit_logs) }; if(data.bonus_settings) await setDoc(doc(db,'closings','__bonus_settings'),data.bonus_settings,{merge:true}); await logAudit('backup_import_data_manager',counts); toast(`Import selesai: ${Object.values(counts).reduce((a,b)=>a+b,0)} dokumen`); }catch(e){ toast(e.message||'Gagal import backup',true); } setLoading(false); }

  function logsHtml(){ const list=state.logs.filter(l=>!state.filters.q || JSON.stringify(l).toLowerCase().includes(state.filters.q.toLowerCase())).slice(0,200); return `<div class="card card-pad"><div class="spaced"><div><div class="metric-label">Audit Log</div><div class="title">${state.logs.length} log</div></div><input class="input" style="max-width:260px" placeholder="Cari log..." value="${escapeHtml(state.filters.q)}" oninput="setSearch(this.value)"></div><div class="list" style="margin-top:14px">${list.length?list.map(logItemHtml).join(''):empty('Belum ada log')}</div></div>`; }
  function logItemHtml(l){ return `<div class="item"><div class="item-main"><div class="row"><span class="title">${escapeHtml(l.action || 'audit')}</span><span class="pill blue">${escapeHtml(l.actorName || l.actor || '-')}</span></div><div class="meta">${escapeHtml(fmtDateTime(recMs(l)))}<br>${escapeHtml(JSON.stringify(l.detail || {}))}</div></div><button class="btn btn-danger btn-sm" onclick="hardDeleteRecord('audit_logs',${jsArg(l.id)})"><i class="fas fa-trash"></i></button></div>`; }

  function empty(text){ return `<div class="empty">${escapeHtml(text)}</div>`; }
  function setSearch(v){ state.filters.q = String(v||''); renderContentOnly(); }
  function setFilter(k,v){ state.filters[k]=v; renderContentOnly(); }
  function resetFilters(){ state.filters={q:'',user:'all',status:'active',start:'',end:''}; renderContentOnly(); }

  async function softDeleteRecord(col,id){ if(!confirm(`Tandai ${col}/${id} sebagai terhapus?`)) return; setLoading(true); try{ await setDoc(doc(db,col,id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.currentUser.username,deletedByName:state.currentUser.name},{merge:true}); await logAudit(`${col}_soft_delete_data_manager`,{id}); toast('Data ditandai terhapus'); }catch(e){ toast(e.message||'Gagal hapus data',true); } setLoading(false); }
  async function restoreRecord(col,id){ setLoading(true); try{ await setDoc(doc(db,col,id),{deleted:false,deletedAt:null,deletedAtMs:null,deletedBy:null,deletedByName:null,restoredAt:serverTimestamp(),restoredAtMs:Date.now(),restoredBy:state.currentUser.username},{merge:true}); await logAudit(`${col}_restore_data_manager`,{id}); toast('Data dipulihkan'); }catch(e){ toast(e.message||'Gagal restore data',true); } setLoading(false); }
  async function hardDeleteRecord(col,id){ const pin=prompt(`HAPUS PERMANEN ${col}/${id}?\nMasukkan PIN admin:`); if(!pin || pin!==String(state.currentUser.pin)) return toast('PIN salah / batal',true); if(!confirm('Data akan hilang permanen. Lanjut?')) return; setLoading(true); try{ await deleteDoc(doc(db,col,id)); await logAudit(`${col}_hard_delete_data_manager`,{id}); toast('Data dihapus permanen'); }catch(e){ toast(e.message||'Gagal hapus permanen',true); } setLoading(false); }

  window.login=login; window.logout=logout; window.setTab=setTab; window.toggleMenu=toggleMenu; window.toggleTheme=toggleTheme; window.setSearch=setSearch; window.setFilter=setFilter; window.resetFilters=resetFilters;
  window.openFormModal=openFormModal; window.closeFormModal=closeFormModal;
  window.saveUser=saveUser; window.openUserModal=openUserModal; window.editUser=editUser; window.clearUserForm=clearUserForm; window.softDeleteUser=softDeleteUser; window.restoreUser=restoreUser; window.hardDeleteUser=hardDeleteUser;
  window.saveTransaction=saveTransaction; window.openTransactionModal=openTransactionModal; window.editTransaction=editTransaction; window.clearTxForm=clearTxForm;
  window.saveAttendance=saveAttendance; window.openAttendanceModal=openAttendanceModal; window.editAttendance=editAttendance; window.clearAttForm=clearAttForm;
  window.saveClosing=saveClosing; window.openClosingModal=openClosingModal; window.editClosing=editClosing; window.clearClosingForm=clearClosingForm; window.toggleClosingUserField=()=>{};
  window.saveBonus=saveBonus; window.loadRawDoc=loadRawDoc; window.saveRawDoc=saveRawDoc; window.deleteRawDoc=deleteRawDoc; window.downloadBackup=downloadBackup; window.importBackup=importBackup;
  window.softDeleteRecord=softDeleteRecord; window.restoreRecord=restoreRecord; window.hardDeleteRecord=hardDeleteRecord;

  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(raw){ state.currentUser = JSON.parse(raw); if(state.currentUser && isAdminUser(state.currentUser)) await bindData(); }
  }catch(e){ localStorage.removeItem(SESSION_KEY); }
  render();
</script>
</body>
</html>
