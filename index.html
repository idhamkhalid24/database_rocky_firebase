<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, addDoc, deleteDoc, collection, getDocs, onSnapshot, serverTimestamp, query, orderBy, limit, Timestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

const firebaseConfig = { apiKey:'AIzaSyAqmTEKnLKOXcmOoR9RrXksNe5_Fix42w8', authDomain:'rocky-fd14b.firebaseapp.com', projectId:'rocky-fd14b', storageBucket:'rocky-fd14b.firebasestorage.app', messagingSenderId:'861954349314', appId:'1:861954349314:web:bb8384825daedb8d34ca1b' };
const app = initializeApp(firebaseConfig), db = getFirestore(app);
const ADMIN_NAMES = ['admin']; const SESSION='rocky_admin_data_session_v1';
let me=null, page='transactions', tx=[], att=[], users=[], unsub=[];
let txSelected=new Set(), txMode='daily', txLimit=180;
const $=id=>document.getElementById(id); const clean=s=>String(s||'').trim().toLowerCase();
const rp=n=>new Intl.NumberFormat('id-ID').format(Number(n||0));
const today=()=>new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jakarta',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
const month=()=>today().slice(0,7);
function toast(m,err=false){const t=$('toast');t.textContent=m;t.style.color=err?'#ffb4b4':'#f3f7ff';t.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('show'),2600)}
function ms(o){ if(o?.createdAtMs) return Number(o.createdAtMs); if(o?.createdAt?.toDate) return o.createdAt.toDate().getTime(); if(o?.time) return new Date(String(o.time).replace(' ','T')+'+07:00').getTime(); return 0; }
function dateKey(o){ return String(o?.dateKey || o?.time || o?.createdAt || '').slice(0,10) || (ms(o)?new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jakarta'}).format(new Date(ms(o))):''); }
function timeKey(o){ const m=ms(o); return m?new Date(m).toLocaleTimeString('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}):'08:00'; }
function normalizeTimeInput(v){let raw=String(v||'').trim().replace('.',':'); if(/^\d{1,2}$/.test(raw)) raw=raw.padStart(2,'0')+':00'; const m=raw.match(/^(\d{1,2}):(\d{1,2})$/); if(!m) throw Error('Format jam salah. Contoh benar: 08:30'); const h=Math.max(0,Math.min(23,Number(m[1]))), min=Math.max(0,Math.min(59,Number(m[2]))); return String(h).padStart(2,'0')+':'+String(min).padStart(2,'0');}
function wibDateTimeMs(d,t){ const date=d||today(), time=normalizeTimeInput(t||'08:00'); return new Date(`${date}T${time}:00+07:00`).getTime(); }
function clearAttendanceLocalCache(username=''){try{Object.keys(localStorage).forEach(k=>{if(k.startsWith('rocky_attendance_cache_') && (!username || k.includes(clean(username)))) localStorage.removeItem(k);});}catch(e){}}
function isAdminUser(u){return u && (u.role==='admin'||ADMIN_NAMES.includes(clean(u.username)))}
function safe(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function adminByUsername(username){const snap=await getDoc(doc(db,'users',clean(username))); if(!snap.exists()) throw Error('User tidak ditemukan'); const u={id:snap.id,...snap.data(),username:clean(username)}; if(!isAdminUser(u)) throw Error('Akun ini bukan admin'); return u}
window.login=async()=>{try{const username=clean($('loginUser').value), pin=String($('loginPin').value||'').trim(); if(!username||!pin) return toast('Lengkapi login',true); const u=await adminByUsername(username); if(String(u.pin)!==pin) throw Error('PIN salah'); me=u; localStorage.setItem(SESSION,JSON.stringify(u)); start(); toast('Login admin berhasil');}catch(e){toast(e.message,true)}};
window.addEventListener('DOMContentLoaded',()=>{['loginUser','loginPin'].forEach(id=>{const el=$(id); if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter') login();});});});
function restore(){try{const u=JSON.parse(localStorage.getItem(SESSION)||'null'); if(u&&isAdminUser(u)){me=u;start()}}catch(e){}}
window.logout=()=>{localStorage.removeItem(SESSION);unsub.forEach(f=>f&&f());unsub=[];me=null;document.body.classList.add('login-mode');$('loginPage').classList.remove('hide');$('mainPage').classList.add('hide');$('tabs').classList.add('hide')};
function start(){ document.body.classList.remove('login-mode');$('loginPage').classList.add('hide');$('mainPage').classList.remove('hide');$('tabs').classList.remove('hide');$('whoami').textContent=`${me.name||me.username} · ${me.username}`; bind(); render(); }
function bind(){unsub.forEach(f=>f&&f());unsub=[];unsub.push(onSnapshot(query(collection(db,'transactions'),limit(1200)),s=>{tx=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>ms(b)-ms(a));stats();render()}));unsub.push(onSnapshot(query(collection(db,'attendance'),limit(1200)),s=>{att=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>ms(b)-ms(a));stats();render()}));unsub.push(onSnapshot(query(collection(db,'users'),orderBy('name')),s=>{users=s.docs.map(d=>({id:d.id,...d.data()}));stats();render()}));}
function stats(){const live=tx.filter(t=>t.deleted!==true);$('stToday').textContent='Rp '+rp(live.filter(t=>dateKey(t)===today()).reduce((a,b)=>a+Number(b.amount||0),0));$('stMonth').textContent='Rp '+rp(live.filter(t=>String(t.monthKey||dateKey(t)).slice(0,7)===month()).reduce((a,b)=>a+Number(b.amount||0),0));$('stTx').textContent=String(live.length);$('stUsers').textContent=String(users.filter(u=>u.active!==false).length)}
window.go=p=>{page=p;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['transactions','attendance','users','backup'][i]===p));render()};
function render(){ if(!me) return; if(page==='transactions') return renderTx(); if(page==='attendance') return renderAtt(); if(page==='users') return renderUsers(); renderBackup(); }
function userOptions(){return '<option value="all">Semua User</option>'+users.map(u=>`<option value="${safe(u.username)}">${safe(u.name||u.username)}</option>`).join('')}
function renderTx(){ txSelected.clear(); txLimit=180; $('view').innerHTML=`<div class="card pad"><div class="top"><div><div class="label">Editor Transaksi</div><h1>Filter harian, bulanan, tahunan + hapus massal</h1></div><button class="btn" onclick="openTx()"><i class="fa-solid fa-plus"></i> Tambah</button></div><div class="toolbar"><input id="q" placeholder="Cari item/user/nominal..." oninput="drawTx()"><select id="uf" onchange="clearTxSelection();drawTx()">${userOptions()}</select><select id="df" onchange="clearTxSelection();drawTx()"><option value="live">Aktif</option><option value="deleted">Terhapus</option><option value="all">Semua</option></select><button class="btn ghost" onclick="drawTx()">Filter</button></div><div class="filtergrid"><select id="tf" onchange="setTxMode(this.value)"><option value="daily">Harian</option><option value="monthly">Bulanan</option><option value="yearly">Tahunan</option><option value="range">Custom</option><option value="all">Semua Tanggal</option></select><input id="td" type="date" value="${today()}" onchange="clearTxSelection();drawTx()"><input id="tm" type="month" value="${month()}" onchange="clearTxSelection();drawTx()"><input id="ty" type="number" min="2020" max="2099" value="${today().slice(0,4)}" onchange="clearTxSelection();drawTx()"><input id="ts" class="span2" type="date" value="${today()}" onchange="clearTxSelection();drawTx()"><input id="te" class="span2" type="date" value="${today()}" onchange="clearTxSelection();drawTx()"></div><div id="bulkBox" class="bulkbar"></div><div id="txList" class="list"></div></div>`; setTxMode('daily'); }
function getFilteredTx(){const q=clean($('q')?.value), uf=$('uf')?.value||'all', df=$('df')?.value||'live', mode=$('tf')?.value||txMode; let arr=tx.filter(t=>df==='all'?true:df==='deleted'?t.deleted===true:t.deleted!==true); if(uf!=='all') arr=arr.filter(t=>clean(t.user)===clean(uf)); if(mode==='daily'){const d=$('td')?.value||today(); arr=arr.filter(t=>dateKey(t)===d)} else if(mode==='monthly'){const m=$('tm')?.value||month(); arr=arr.filter(t=>String(t.monthKey||dateKey(t)).slice(0,7)===m)} else if(mode==='yearly'){const y=String($('ty')?.value||today().slice(0,4)); arr=arr.filter(t=>String(dateKey(t)).startsWith(y))} else if(mode==='range'){const s=$('ts')?.value||today(), e=$('te')?.value||today(); arr=arr.filter(t=>dateKey(t)>=s && dateKey(t)<=e)} if(q) arr=arr.filter(t=>clean(`${t.note} ${t.user} ${t.name} ${t.amount} ${dateKey(t)}`).includes(q)); return arr;}
window.setTxMode=(m)=>{txMode=m; const daily=$('td'), monthly=$('tm'), yearly=$('ty'), start=$('ts'), end=$('te'); if(daily)daily.style.display=m==='daily'?'block':'none'; if(monthly)monthly.style.display=m==='monthly'?'block':'none'; if(yearly)yearly.style.display=m==='yearly'?'block':'none'; if(start)start.style.display=m==='range'?'block':'none'; if(end)end.style.display=m==='range'?'block':'none'; clearTxSelection(); drawTx();}
window.clearTxSelection=()=>{txSelected.clear();}
window.toggleTx=(id,checked)=>{checked?txSelected.add(id):txSelected.delete(id); drawBulkBox();}
window.toggleSelectTxVisible=()=>{const visible=getFilteredTx().slice(0,txLimit); const allVisibleSelected=visible.length>0 && visible.every(t=>txSelected.has(t.id)); if(allVisibleSelected){visible.forEach(t=>txSelected.delete(t.id));}else{visible.forEach(t=>txSelected.add(t.id));} drawTx();}
window.unselectTx=()=>{txSelected.clear(); drawTx();}
function drawBulkBox(){const arr=getFilteredTx(); const shown=arr.slice(0,txLimit); const selected=[...txSelected].filter(id=>arr.some(t=>t.id===id)); txSelected=new Set(selected); const total=arr.reduce((a,b)=>a+Number(b.amount||0),0); const allVisibleSelected=shown.length>0 && shown.every(t=>txSelected.has(t.id)); const toggleText=allVisibleSelected?'Unselect':'Select All'; const toggleIcon=allVisibleSelected?'fa-square-minus':'fa-square-check'; const box=$('bulkBox'); if(!box)return; box.innerHTML=`<div><b>${arr.length}</b> data · Rp ${rp(total)}<div class="compact-note">Terpilih: ${txSelected.size} transaksi</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn ghost" onclick="toggleSelectTxVisible()"><i class="fa-solid ${toggleIcon}"></i> ${toggleText}</button><button class="btn red" onclick="bulkSoftDelTx()"><i class="fa-solid fa-trash"></i> Hapus</button></div>`;}
window.drawTx=()=>{const arr=getFilteredTx(); drawBulkBox(); const shown=arr.slice(0,txLimit); $('txList').innerHTML=shown.map(t=>`<div class="row"><div style="display:flex;gap:9px;align-items:flex-start"><input class="check" type="checkbox" ${txSelected.has(t.id)?'checked':''} onchange="toggleTx('${t.id}',this.checked)"><div><b>${safe(t.note||'Transaksi')}</b><div class="small">${safe(t.name||t.user)} · ${safe(dateKey(t))} ${t.deleted?'<span class="pill" style="color:var(--red)">Terhapus</span>':''}</div></div></div><div class="money">Rp ${rp(t.amount)}</div><div class="small">${safe(t.user||'-')}</div><div style="display:flex;gap:7px;flex-wrap:wrap"><button class="btn ghost" onclick="openTx('${t.id}')">Edit</button>${t.deleted?`<button class="btn green" onclick="restoreTx('${t.id}')">Pulihkan</button><button class="btn red" onclick="hardDelTx('${t.id}')">Permanent</button>`:`<button class="btn red" onclick="softDelTx('${t.id}')">Hapus</button>`}</div></div>`).join('')+(arr.length>shown.length?`<button class="btn ghost" onclick="txLimit+=180;drawTx()">Tampilkan lagi (${arr.length-shown.length})</button>`:'')||'<div class="small">Tidak ada data.</div>'};
window.bulkSoftDelTx=async()=>{const ids=[...txSelected]; if(!ids.length)return toast('Belum ada transaksi yang dicentang',true); const live=ids.map(id=>tx.find(t=>t.id===id)).filter(t=>t&&t.deleted!==true); if(!live.length)return toast('Yang dipilih sudah terhapus semua',true); if(!confirm(`Hapus ${live.length} transaksi terpilih? Bisa dipulihkan.`))return; for(const t of live){await setDoc(doc(db,'transactions',t.id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:me.username},{merge:true});} txSelected.clear(); toast(`${live.length} transaksi dihapus aman`)};
window.openTx=(id='')=>{const t=tx.find(x=>x.id===id)||{}; $('modalBody').innerHTML=`<h1>${id?'Edit':'Tambah'} Transaksi</h1><div class="formgrid" style="margin-top:14px"><select id="mUser">${users.map(u=>`<option value="${safe(u.username)}" ${clean(t.user)===clean(u.username)?'selected':''}>${safe(u.name||u.username)}</option>`).join('')}</select><input id="mAmount" inputmode="numeric" placeholder="Nominal" value="${t.amount||''}"><input id="mDate" type="date" value="${dateKey(t)||today()}"><input id="mNote" class="full" placeholder="Keterangan / item" value="${safe(t.note||'')}"></div><div style="display:flex;gap:9px;margin-top:14px"><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn" onclick="saveTx('${id}')">Simpan</button></div>`;$('modal').classList.add('show')};
window.saveTx=async(id='')=>{try{const u=users.find(x=>clean(x.username)===clean($('mUser').value))||{}; const dk=$('mDate').value||today(); const data={user:clean($('mUser').value),name:u.name||$('mUser').value,note:$('mNote').value||'Transaksi',amount:Number(String($('mAmount').value).replace(/\D/g,'')),dateKey:dk,monthKey:dk.slice(0,7),createdAtMs:id?(tx.find(t=>t.id===id)?.createdAtMs||Date.now()):Date.now(),updatedAt:serverTimestamp(),updatedBy:me.username,deleted:false}; if(!data.amount) throw Error('Nominal kosong'); if(id) await setDoc(doc(db,'transactions',id),data,{merge:true}); else await addDoc(collection(db,'transactions'),{...data,createdAt:serverTimestamp()}); closeModal(); toast('Transaksi disimpan')}catch(e){toast(e.message,true)}};
window.softDelTx=async(id)=>{if(!confirm('Hapus transaksi ini? Bisa dipulihkan.'))return; await setDoc(doc(db,'transactions',id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:me.username},{merge:true});toast('Transaksi dihapus aman')};
window.restoreTx=async(id)=>{await setDoc(doc(db,'transactions',id),{deleted:false,deletedAt:null,deletedBy:null},{merge:true});toast('Transaksi dipulihkan')};
window.hardDelTx=async(id)=>{if(!confirm('Hapus permanen? Tidak bisa dikembalikan.'))return; await deleteDoc(doc(db,'transactions',id));toast('Dihapus permanen')};
function renderAtt(){const todayAtt=new Set(att.filter(a=>dateKey(a)===today()).map(a=>clean(a.user))).size;$('view').innerHTML=`<div class="card pad"><div class="top"><div><div class="label">Data Absensi</div><h1>${todayAtt} user absen hari ini</h1></div><button class="btn" onclick="openAtt()"><i class="fa-solid fa-plus"></i> Tambah</button></div><div class="toolbar"><input id="aq" placeholder="Cari user/nama/tanggal" oninput="drawAtt()"><select id="auf" onchange="drawAtt()">${userOptions()}</select><input id="adf" type="date" onchange="drawAtt()"><button class="btn ghost" onclick="drawAtt()">Filter</button></div><div id="attList" class="list"></div></div>`;drawAtt()}
window.drawAtt=()=>{const q=clean($('aq')?.value), uf=$('auf')?.value||'all', d=$('adf')?.value; let arr=att; if(uf!=='all')arr=arr.filter(a=>clean(a.user)===clean(uf)); if(d)arr=arr.filter(a=>dateKey(a)===d); if(q)arr=arr.filter(a=>clean(`${a.user} ${a.name} ${dateKey(a)} ${timeKey(a)}`).includes(q)); $('attList').innerHTML=arr.slice(0,180).map(a=>`<div class="row"><div><b>${safe(a.name||a.user)}</b><div class="small">${safe(dateKey(a))} · ${safe(timeKey(a))}</div></div><div>${a.loc?`<span class="pill"><i class="fa-solid fa-location-dot"></i> GPS ada</span>`:'<span class="pill">Tanpa GPS</span>'}</div><div class="small">@${safe(a.user)}${a.manual?' · manual':''}</div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn ghost" onclick="openAtt('${a.id}')">Edit</button><button class="btn red" onclick="delAtt('${a.id}')">Hapus</button></div></div>`).join('')||'<div class="small">Tidak ada data.</div>'};
window.openAtt=(id='')=>{const a=att.find(x=>x.id===id)||{};const selected=clean(a.user);$('modalBody').innerHTML=`<h1>${id?'Edit':'Tambah'} Absen</h1><div class="small" style="margin-top:4px">Tanggal, jam, user, dan titik GPS absen bisa dikoreksi di sini.</div><div class="formgrid" style="margin-top:12px"><select id="aUser">${users.map(u=>`<option value="${safe(u.username)}" ${selected===clean(u.username)?'selected':''}>${safe(u.name||u.username)}</option>`).join('')}</select><input id="aDate" type="date" value="${dateKey(a)||today()}"><input id="aTime" type="time" step="60" inputmode="numeric" value="${timeKey(a)}"><input id="aName" placeholder="Nama tampilan" value="${safe(a.name||'')}"><input id="aLat" placeholder="Latitude opsional" inputmode="decimal" value="${a.loc?.lat??''}"><input id="aLng" placeholder="Longitude opsional" inputmode="decimal" value="${a.loc?.lng??''}"></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn" onclick="saveAtt('${id}')">Simpan</button></div>`;$('modal').classList.add('show')};
window.saveAtt=async(id='')=>{try{const username=clean($('aUser').value);const u=users.find(x=>clean(x.username)===username)||{};const dk=$('aDate').value||today();const tm=normalizeTimeInput($('aTime').value||'08:00');const createdAtMs=wibDateTimeMs(dk,tm);const lat=String($('aLat').value||'').trim(), lng=String($('aLng').value||'').trim();if(lat&&!Number.isFinite(Number(lat))) throw Error('Latitude harus angka'); if(lng&&!Number.isFinite(Number(lng))) throw Error('Longitude harus angka');const loc=(lat&&lng)?{lat:Number(lat),lng:Number(lng)}:null;const data={user:username,name:$('aName').value||u.name||username,dateKey:dk,time:`${dk} ${tm}:00`,createdAtMs,createdAt:Timestamp.fromMillis(createdAtMs),manual:true,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:me.username,editedByAdmin:true}; if(loc) data.loc=loc; else data.loc=null; if(id){await setDoc(doc(db,'attendance',id),data,{merge:true});att=att.map(a=>a.id===id?{...a,...data}:a).sort((a,b)=>ms(b)-ms(a));} else {const ref=await addDoc(collection(db,'attendance'),{...data,createdBy:me.username});att=[{id:ref.id,...data},...att].sort((a,b)=>ms(b)-ms(a));} clearAttendanceLocalCache(username); closeModal(); stats(); render(); toast(id?'Absen diedit realtime':'Absen manual disimpan')}catch(e){toast(e.message,true)}};
window.delAtt=async(id)=>{if(!confirm('Hapus data absen ini?'))return;await deleteDoc(doc(db,'attendance',id));toast('Absen dihapus')};
function renderUsers(){ $('view').innerHTML=`<div class="card pad"><div class="top"><div><div class="label">Kelola User</div><h1>Tambah, edit, reset PIN, nonaktifkan staff</h1></div><button class="btn" onclick="openUser()"><i class="fa-solid fa-user-plus"></i> User</button></div><div id="userList" class="list">${users.map(u=>`<div class="row"><div><b>${safe(u.name||u.username)}</b><div class="small">@${safe(u.username)} · ${safe(u.role||'staff')}</div></div><div><span class="pill" style="color:${u.active===false?'var(--red)':'var(--green)'}">${u.active===false?'Nonaktif':'Aktif'}</span></div><div class="small">PIN: ${safe(u.pin||'-')}</div><div style="display:flex;gap:7px;flex-wrap:wrap"><button class="btn ghost" onclick="openUser('${u.username}')">Edit</button><button class="btn red" onclick="delUser('${u.username}')">Hapus</button></div></div>`).join('')}</div></div>`;}
window.openUser=(username='')=>{const u=users.find(x=>clean(x.username)===clean(username))||{}; $('modalBody').innerHTML=`<h1>${username?'Edit':'Tambah'} User</h1><div class="formgrid" style="margin-top:14px"><input id="uName" placeholder="Nama" value="${safe(u.name||'')}"><input id="uUsername" placeholder="username" value="${safe(u.username||'')}"><input id="uPin" placeholder="PIN" value="${safe(u.pin||'')}"><select id="uRole"><option value="staff" ${u.role!=='admin'?'selected':''}>staff</option><option value="admin" ${u.role==='admin'?'selected':''}>admin</option></select><select id="uActive" class="full"><option value="true" ${u.active!==false?'selected':''}>Aktif</option><option value="false" ${u.active===false?'selected':''}>Nonaktif</option></select></div><div style="display:flex;gap:9px;margin-top:14px"><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn" onclick="saveUser('${username}')">Simpan</button></div>`;$('modal').classList.add('show')};
window.saveUser=async(old='')=>{const username=clean($('uUsername').value); if(!username)return toast('Username kosong',true); const data={username,name:$('uName').value||username,pin:String($('uPin').value||''),role:$('uRole').value,active:$('uActive').value==='true',updatedAt:serverTimestamp()}; await setDoc(doc(db,'users',username),data,{merge:true}); if(old&&clean(old)!==username) await deleteDoc(doc(db,'users',clean(old))); closeModal();toast('User disimpan')};
window.delUser=async(username)=>{if(clean(username)===clean(me.username)) return toast('Admin login tidak boleh dihapus',true); if(!confirm('Hapus permanen user ini?'))return; await deleteDoc(doc(db,'users',clean(username))); toast('User dihapus')};
function payload(){return{version:'admin-data-app',exportedAt:new Date().toISOString(),data:{users,attendance:att,transactions:tx}}}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function renderBackup(){ $('view').innerHTML=`<div class="grid"><div class="card pad"><div class="label">Backup & Export</div><h1>Download data Firebase</h1><p class="small">Backup mengambil data yang sedang tersinkron di aplikasi admin ini.</p><div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:12px"><button class="btn" onclick="backupJson()"><i class="fa-solid fa-file-code"></i> JSON</button><button class="btn green" onclick="backupExcel()"><i class="fa-solid fa-file-excel"></i> Excel</button></div></div><div class="card pad danger-zone"><div class="label">Restore Ringan</div><h1>Import JSON Backup</h1><p class="small">Gunakan hati-hati. Data dari file akan ditambahkan/ditimpa sesuai ID user, transaksi/absen akan ditambahkan sebagai data baru.</p><input id="restoreFile" type="file" accept=".json" style="margin:10px 0"><button class="btn red" onclick="restoreJson()"><i class="fa-solid fa-upload"></i> Restore JSON</button></div></div>`}
window.backupJson=()=>{download(`rocky-admin-backup-${Date.now()}.json`,JSON.stringify(payload(),null,2),'application/json');toast('Backup JSON diunduh')};
window.backupExcel=()=>{const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(users),'users');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(att),'attendance');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(tx),'transactions');XLSX.writeFile(wb,`rocky-admin-backup-${Date.now()}.xlsx`);toast('Backup Excel diunduh')};
window.restoreJson=async()=>{try{const f=$('restoreFile').files[0]; if(!f) return toast('Pilih file JSON dulu',true); const b=JSON.parse(await f.text()); const d=b.data||b; for(const u of d.users||[]) if(u.username) await setDoc(doc(db,'users',clean(u.username)),{...u,username:clean(u.username)},{merge:true}); for(const a of d.attendance||[]) await addDoc(collection(db,'attendance'),{...a,user:clean(a.user),createdAt:serverTimestamp(),createdAtMs:Number(a.createdAtMs||Date.now())}); for(const t of d.transactions||[]) await addDoc(collection(db,'transactions'),{...t,user:clean(t.user),amount:Number(t.amount||0),createdAt:serverTimestamp(),createdAtMs:Number(t.createdAtMs||Date.now()),deleted:t.deleted===true}); toast('Restore JSON selesai')}catch(e){toast('Restore gagal: '+e.message,true)}};
window.closeModal=()=>{$('modal').classList.remove('show')};$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
restore();
</script>
</body>
