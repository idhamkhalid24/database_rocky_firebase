function bind(){unsub.forEach(f=>f&&f());unsub=[];

    if(setting) applyBonusSetting(setting);
    closings=all.filter(c=>c.id!=='__bonus_settings'&&c.dateKey!=='__bonus_settings'&&c.type!=='bonus_settings').sort((a,b)=>String(b.dateKey||'').localeCompare(String(a.dateKey||'')) || ms(b)-ms(a));
    stats();render();
  },e=>toast('Sync closing gagal: '+(e.code||e.message),true)));
  unsub.push(onSnapshot(doc(db,'closings','__bonus_settings'),snap=>{ if(snap.exists()) applyBonusSetting(snap.data()||{}); else cachedBonusSettings={transactionBonusRate:DEFAULT_TRANSACTION_BONUS_RATE,closingBonusPerMinute:DEFAULT_CLOSING_BONUS_PER_MINUTE}; stats();render(); },e=>console.warn('Bonus setting sync gagal',e)));
  unsub.push(onSnapshot(collection(db,'audit_logs'),s=>{auditLogs=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>ms(b)-ms(a));stats();render()},e=>console.warn('Audit log sync gagal',e)));
}
function getTransactionBonusRate(){const rate=Number(cachedBonusSettings?.transactionBonusRate);return Number.isFinite(rate)&&rate>=0?rate:DEFAULT_TRANSACTION_BONUS_RATE}
function getTransactionBonusPercent(){return Number((getTransactionBonusRate()*100).toFixed(3))}
function getClosingBonusPerMinute(){const amount=Number(cachedBonusSettings?.closingBonusPerMinute);return Number.isFinite(amount)&&amount>=0?amount:DEFAULT_CLOSING_BONUS_PER_MINUTE}
function calculateBonus(omzet){return Math.round(Number(omzet||0)*getTransactionBonusRate())}
function monthTxForUser(username, m=month()){const key=clean(username);return tx.filter(t=>t.deleted!==true && clean(t.user)===key && String(t.monthKey||dateKey(t)).slice(0,7)===m)}
function monthTx(m=month()){return tx.filter(t=>t.deleted!==true && String(t.monthKey||dateKey(t)).slice(0,7)===m)}
function activeStaffUsers(){return users.filter(u=>u.active!==false && !isAdminUser(u))}
function monthlyClosingRecords(m=month()){return closings.filter(c=>c.closed===true && String(c.monthKey||c.dateKey||'').slice(0,7)===m)}
function getClosingBonusPerUserDynamic(c){if(!c||c.closed!==true)return 0;const delay=Number(c.delayMinutes||0);if(!Number.isFinite(delay)||delay<=0)return 0;return Math.round(delay*getClosingBonusPerMinute())}
function getClosingTotalUsers(c){if(!c)return 0;const stored=Number(c.totalUsers||0);if(Number.isFinite(stored)&&stored>0)return stored;const byUser=c.bonusByUser||{};const count=Object.keys(byUser).filter(k=>clean(k)&&clean(k)!=='admin').length;if(count>0)return count;return activeStaffUsers().filter(u=>!isDailyEmployee(u)).length}
function getClosingBonusValue(c,username=null){if(!c||c.closed!==true)return 0;const byUser=c.bonusByUser||{};const target=username&&username!=='all'?clean(username):null;if(target)return Number(byUser[target]||0);if(Object.keys(byUser).length)return Object.values(byUser).reduce((a,b)=>a+Number(b||0),0);return Number(c.totalBonus||0)||getClosingBonusPerUserDynamic(c)*getClosingTotalUsers(c)}
function getMonthlyClosingBonus(username=null,m=month()){if(username&&username!=='all'&&isDailyEmployee(username))return 0;return monthlyClosingRecords(m).reduce((sum,c)=>sum+getClosingBonusValue(c,username),0)}
function getBonusBreakdown(items, username=null, m=month()){const monthItems=items.filter(t=>String(t.monthKey||dateKey(t)).slice(0,7)===m);const omzet=monthItems.reduce((a,b)=>a+Number(b.amount||0),0);const trxBonus=calculateTransactionBonusForList(monthItems);const closingBonus=getMonthlyClosingBonus(username,m);return{omzet,trxBonus,closingBonus,totalBonus:trxBonus+closingBonus,count:monthItems.length,percent:getTransactionBonusPercent()}}
function userBonusData(u, m=month()){const items=monthTxForUser(u.username,m);return getBonusBreakdown(items,clean(u.username),m)}
function totalBonusMonth(m=month()){return getBonusBreakdown(monthTx(m),null,m).totalBonus}

  const top3=ranked.slice(0,3);
  const settingInfo=`Bonus transaksi ${getTransactionBonusPercent()}% · closing Rp ${rp(getClosingBonusPerMinute())}/menit`;
  const rankingHtml=top3.length?top3.map((x,i)=>`<div class="rank-card" style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:16px;background:${i===0?'#fff8e6':'#f8fafc'}"><div style="display:flex;align-items:center;gap:10px;min-width:0"><div style="width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:950;background:${i===0?'#ffd166':'#e0f2fe'};color:#102033">#${i+1}</div><div style="min-width:0"><b style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${safe(x.u.name||x.u.username)}</b><div class="small">Omzet Rp ${rp(x.b.omzet)} · closing Rp ${rp(x.b.closingBonus)}</div></div></div><div class="money" style="font-size:17px;color:var(--green);white-space:nowrap">Rp ${rp(x.b.totalBonus)}</div></div>`).join(''):'<div class="small">Belum ada ranking bonus.</div>';
  const usersHtml=ranked.concat(users.filter(u=>u.active===false).map(u=>({u,b:userBonusData(u)}))).map(({u,b})=>`<div class="row" style="display:flex;flex-direction:column;gap:0;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0">
      <div style="min-width:0;flex:1">
        <b style="display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${safe(u.name||u.username)}</b>
        <div class="small" style="margin-top:2px">@${safe(u.username)} · ${safe(u.role||'staff')} ${u.active===false?'· <span style="color:var(--red)">Nonaktif</span>':''}</div>
      </div>
      <div style="text-align:right;flex:0 0 auto">
        <div class="money" style="font-size:17px;color:var(--green);white-space:nowrap">Rp ${rp(b.totalBonus)}</div>
        <div class="small" style="color:var(--muted);margin-top:1px">bonus bulan ini</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)">
      <div class="small" style="color:var(--muted)">Omzet: <b style="color:var(--text)">Rp ${rp(b.omzet)}</b> · bonus trx Rp ${rp(b.trxBonus)} · closing Rp ${rp(b.closingBonus)}</div>
    </div>
  </div>`).join('');
  $('view').innerHTML=`<div class="card pad"><div class="top"><div><div class="label">User & Bonus</div><h1>Ranking bonus bulan ini</h1><div class="small" style="margin-top:3px">Sumber bonus sama seperti Rocky v32: ${settingInfo}.</div></div></div><div class="grid stats" style="margin:8px 0"><div class="card stat"><span class="label">Omzet Bulan Ini</span><b>Rp ${rp(totalOmzet)}</b></div><div class="card stat"><span class="label">Bonus Transaksi</span><b>Rp ${rp(globalBonus.trxBonus)}</b></div><div class="card stat"><span class="label">Bonus Closing</span><b>Rp ${rp(globalBonus.closingBonus)}</b></div><div class="card stat"><span class="label">Total Bonus Global</span><b>Rp ${rp(globalBonus.totalBonus)}</b></div></div><div class="list" style="margin:10px 0 12px">${rankingHtml}</div><div id="userList" class="list">${usersHtml}</div></div>`;
}
window.openUser=(username='')=>{toast('Edit user dimatikan. User ikut sumber utama Rocky v32.',true)};
window.saveUser=async()=>{toast('Edit user dimatikan',true)};
window.delUser=async()=>{toast('Hapus user dimatikan',true)};
function payload(){return{version:'admin-data-app-v13-sync-firebase',projectId:firebaseConfig.projectId,exportedAt:new Date().toISOString(),exportedBy:me?.username||'admin',bonusSettings:cachedBonusSettings,data:{users,attendance:att,transactions:tx,closings,audit_logs:auditLogs}}}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function renderBackup(){ $('view').innerHTML=`<div class="grid"><div class="card pad"><div class="label">Backup & Export Sync v13</div><h1>Download semua data Firebase</h1><p class="small">Sekarang backup ikut data baru dari aplikasi utama: users, attendance, transactions, closings, bonus settings, dan audit logs. Listener juga tidak dibatasi limit agar data baru tetap masuk.</p><div class="grid stats" style="margin:10px 0"><div class="card stat"><span class="label">Transactions</span><b>${tx.length}</b></div><div class="card stat"><span class="label">Attendance</span><b>${att.length}</b></div><div class="card stat"><span class="label">Closings</span><b>${closings.length}</b></div><div class="card stat"><span class="label">Audit Logs</span><b>${auditLogs.length}</b></div></div><div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:12px"><button class="btn" onclick="backupJson()"><i class="fa-solid fa-file-code"></i> JSON Lengkap</button><button class="btn green" onclick="backupExcel()"><i class="fa-solid fa-file-excel"></i> Excel Lengkap</button><button class="btn ghost" onclick="syncNow()"><i class="fa-solid fa-rotate"></i> Sync Ulang</button></div></div><div class="card pad danger-zone"><div class="label">Restore Sync</div><h1>Import JSON Backup</h1><p class="small">Restore ikut struktur aplikasi utama. User ditimpa sesuai username, bonus settings disimpan ke closings/__bonus_settings, closing diawetkan sesuai id, transaksi/absen ditambahkan jika tidak punya id.</p><input id="restoreFile" type="file" accept=".json" style="margin:10px 0"><button class="btn red" onclick="restoreJson()"><i class="fa-solid fa-upload"></i> Restore JSON</button></div></div>`}
window.backupJson=()=>{download(`rocky-admin-sync-v13-${Date.now()}.json`,JSON.stringify(payload(),null,2),'application/json');toast('Backup JSON lengkap diunduh')};
window.backupExcel=()=>{const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(users),'users');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(att),'attendance');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(tx),'transactions');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(closings),'closings');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(auditLogs),'audit_logs');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([cachedBonusSettings]),'bonus_settings');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(users.map(u=>{const b=userBonusData(u);return{username:u.username,name:u.name,role:u.role,dailyBonusPercent:u.dailyBonusPercent||0,bonusPercent:b.percent,omzetBulanIni:b.omzet,totalTransaksi:b.count,bonusTransaksi:b.trxBonus,bonusClosing:b.closingBonus,bonusBulanIni:b.totalBonus}})),'bonus_user');XLSX.writeFile(wb,`rocky-admin-sync-v13-${Date.now()}.xlsx`);toast('Backup Excel lengkap diunduh')};
async function readCollection(name){const snap=await getDocs(collection(db,name));return snap.docs.map(d=>({id:d.id,...d.data()}));}
window.syncNow=async()=>{try{toast('Sync ulang Firebase...');const [txs,ats,us,cls,logs]=await Promise.all([readCollection('transactions'),readCollection('attendance'),readCollection('users'),readCollection('closings'),readCollection('audit_logs').catch(()=>[])]);tx=txs.map(normalizeTx).sort((a,b)=>ms(b)-ms(a));att=ats.map(normalizeAtt).sort((a,b)=>ms(b)-ms(a));users=us.map(normalizeUser).sort((a,b)=>String(a.name||'').localeCompare(String(b.name||'')));const setting=cls.find(c=>c.id==='__bonus_settings'||c.dateKey==='__bonus_settings'||c.type==='bonus_settings');if(setting)applyBonusSetting(setting);closings=cls.filter(c=>c.id!=='__bonus_settings'&&c.dateKey!=='__bonus_settings'&&c.type!=='bonus_settings');auditLogs=logs.sort((a,b)=>ms(b)-ms(a));stats();render();toast(`Sync selesai: ${tx.length} transaksi, ${att.length} absen, ${users.length} user`)}catch(e){toast('Sync gagal: '+e.message,true)}};
function asMillis(v){if(!v)return Date.now(); if(typeof v==='number')return v; if(v?.toDate)return v.toDate().getTime(); const n=new Date(v).getTime(); return Number.isFinite(n)?n:Date.now()}
window.restoreJson=async()=>{try{const f=$('restoreFile').files[0]; if(!f) return toast('Pilih file JSON dulu',true); const b=JSON.parse(await f.text()); const d=b.data||b; if(b.bonusSettings) await setDoc(doc(db,'closings','__bonus_settings'),{...b.bonusSettings,id:'__bonus_settings',dateKey:'__bonus_settings',type:'bonus_settings',updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:me.username,updatedByName:me.name||me.username},{merge:true}); for(const u0 of d.users||[]){const u=normalizeUser(u0); if(u.username) await setDoc(doc(db,'users',u.username),{...u,updatedAt:serverTimestamp(),updatedBy:me.username},{merge:true});} for(const c of d.closings||[]){const id=String(c.id||c.dateKey||'').trim(); if(id) await setDoc(doc(db,'closings',id),c,{merge:true});} for(const a0 of d.attendance||[]){const a=normalizeAtt(a0); const data={...a,user:clean(a.user),createdAt:Timestamp.fromMillis(asMillis(a.createdAtMs||a.createdAt)),createdAtMs:asMillis(a.createdAtMs||a.createdAt),deleted:a.deleted===true}; if(a.id) await setDoc(doc(db,'attendance',a.id),data,{merge:true}); else await addDoc(collection(db,'attendance'),data);} for(const t0 of d.transactions||[]){const t=normalizeTx(t0); const data={...t,user:clean(t.user),amount:Number(t.amount||0),createdAt:Timestamp.fromMillis(asMillis(t.createdAtMs||t.createdAt)),createdAtMs:asMillis(t.createdAtMs||t.createdAt),deleted:t.deleted===true}; if(t.id) await setDoc(doc(db,'transactions',t.id),data,{merge:true}); else await addDoc(collection(db,'transactions'),data);} toast('Restore JSON sync selesai'); syncNow();}catch(e){toast('Restore gagal: '+e.message,true)}};
window.closeModal=()=>{$('modal').classList.remove('show')};$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
restore();
</script>
