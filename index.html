  <style>
    :root{--bg:#eef2f7;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe3ef;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706;--soft:#f8fafc;--nav:#fff;--shadow:0 8px 22px rgba(15,23,42,.08);--safe:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}input,select,textarea{width:100%;min-height:40px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);padding:9px 10px;outline:none}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}textarea{min-height:66px;resize:vertical}.app{max-width:460px;min-height:100vh;margin:auto;background:var(--bg);position:relative}.page{padding:10px 10px 88px}.top{position:sticky;top:0;z-index:10;background:rgba(238,242,247,.94);backdrop-filter:blur(8px);margin:-10px -10px 10px;padding:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}.brand{min-width:0}.title{font-size:18px;font-weight:900;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row{display:flex;align-items:center;gap:7px}.between{display:flex;align-items:center;justify-content:space-between;gap:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px;box-shadow:var(--shadow)}.hero{background:linear-gradient(135deg,#1d4ed8,#38bdf8);color:white;border-radius:18px;padding:14px;box-shadow:var(--shadow)}.hero .sub{color:rgba(255,255,255,.82)}.kicker{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;opacity:.85}.big{font-size:25px;font-weight:950;letter-spacing:-.04em;margin-top:3px}.stat{background:#fff;border:1px solid var(--line);border-radius:15px;padding:10px;min-height:78px}.stat-label{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:900}.stat-val{font-size:20px;font-weight:950;margin-top:6px}.stat-foot{font-size:10.5px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.btn{min-height:40px;border-radius:12px;padding:9px 11px;background:#fff;border:1px solid var(--line);color:var(--text);font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:6px}.btn:active{transform:scale(.98)}.primary{background:var(--blue);border-color:var(--blue);color:#fff}.danger{background:#fee2e2;border-color:#fecaca;color:var(--red)}.success{background:#dcfce7;border-color:#bbf7d0;color:var(--green)}.warn{background:#fef3c7;border-color:#fde68a;color:var(--amber)}.block{width:100%}.sm{min-height:32px;border-radius:10px;padding:6px 8px;font-size:12px}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900;color:var(--muted);background:#fff;white-space:nowrap}.pill.green{background:#dcfce7;color:var(--green);border-color:#bbf7d0}.pill.red{background:#fee2e2;color:var(--red);border-color:#fecaca}.pill.blue{background:#dbeafe;color:var(--blue);border-color:#bfdbfe}.list{display:flex;flex-direction:column;gap:7px}.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center}.main{min-width:0;flex:1}.item-title{font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3}.amount{font-weight:950;font-size:14px;text-align:right}.actions{display:flex;gap:5px}.icon{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:900}.field{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}.label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:900}.hint{font-size:11px;color:var(--muted);line-height:1.35}.filters{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0}.empty{padding:15px;border:1px dashed var(--line);border-radius:14px;text-align:center;color:var(--muted);font-size:12px;background:var(--soft)}.nav{position:fixed;left:50%;bottom:calc(8px + var(--safe));transform:translateX(-50%);width:min(444px,calc(100% - 14px));height:62px;background:var(--nav);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;display:none;z-index:20;padding:5px}.nav button{flex:1;border-radius:15px;background:transparent;color:var(--muted);font-size:10px;font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}.nav button.active{background:#dbeafe;color:var(--blue)}.nav svg{width:19px;height:19px;stroke:currentColor;stroke-width:2.25;fill:none;stroke-linecap:round;stroke-linejoin:round}.fab{position:fixed;right:max(14px,calc((100% - 460px)/2 + 14px));bottom:calc(78px + var(--safe));width:54px;height:54px;border-radius:18px;background:var(--blue);color:#fff;font-size:26px;box-shadow:0 12px 26px rgba(37,99,235,.35);display:none;z-index:22}.modal-wrap{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:40;display:none;align-items:flex-start;justify-content:center;padding:56px 10px 10px}.modal-wrap.show{display:flex}.modal{width:100%;max-width:430px;max-height:86vh;overflow:auto;background:#fff;border-radius:18px;padding:13px;box-shadow:0 24px 70px rgba(0,0,0,.28)}.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}.modal-title{font-size:17px;font-weight:950}.modal-actions{display:flex;gap:7px;margin-top:10px}.modal-actions>*{flex:1}.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:80;background:#0f172a;color:#fff;border-radius:999px;padding:9px 13px;font-weight:800;font-size:12px;display:none;max-width:calc(100% - 18px)}.toast.show{display:block}.loading{position:fixed;inset:0;z-index:60;background:rgba(255,255,255,.6);display:none;align-items:center;justify-content:center}.spin{width:36px;height:36px;border-radius:50%;border:4px solid #cbd5e1;border-top-color:var(--blue);animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.login-card{width:100%;max-width:380px}@media(max-width:360px){.page{padding-left:8px;padding-right:8px}.top{margin-left:-8px;margin-right:-8px}.big{font-size:22px}.stat-val{font-size:18px}.nav span{display:none}.nav{height:56px}.nav svg{width:21px;height:21px}.filters{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}.item{padding:9px}.title{font-size:16px}}
  </style>
</head>
<body>
<div class="app">
  <div id="loading" class="loading"><div class="spin"></div></div>
  <div id="toast" class="toast"></div>
  <div id="modal" class="modal-wrap"></div>
  <main id="page" class="page"></main>
  <button id="fab" class="fab" onclick="openTx()">+</button>
  <nav id="nav" class="nav">
    <button id="nav-dashboard" onclick="go('dashboard')" aria-label="Dashboard"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>Home</span></button>
    <button id="nav-transactions" onclick="go('transactions')" aria-label="Transaksi"><svg viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v16l-3-2-2 2-2-2-2 2-2-2-3 2V5a2 2 0 0 1 2-2Z"/><path d="M9 8h6"/><path d="M9 12h6"/><path d="M9 16h4"/></svg><span>Trx</span></button>
    <button id="nav-attendance" onclick="go('attendance')" aria-label="Absen"><svg viewBox="0 0 24 24"><path d="M7 3v3"/><path d="M17 3v3"/><path d="M4 8h16"/><rect x="4" y="5" width="16" height="16" rx="3"/><path d="m8 14 3 3 5-6"/></svg><span>Absen</span></button>
    <button id="nav-users" onclick="go('users')" aria-label="User"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>User</span></button>
    <button id="nav-settings" onclick="go('settings')" aria-label="Setelan"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 15.5c.1.4.3.8.6 1.1l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1c-.3-.3-.7-.5-1.1-.6-.4-.1-.9 0-1.2.2l-.2.1a2 2 0 1 1-4 0l-.2-.1c-.4-.2-.8-.3-1.2-.2-.4.1-.8.3-1.1.6l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1c.3-.3.5-.7.6-1.1.1-.4 0-.9-.2-1.2l-.1-.2a2 2 0 1 1 0-4l.1-.2c.2-.4.3-.8.2-1.2-.1-.4-.3-.8-.6-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1c.3.3.7.5 1.1.6.4.1.9 0 1.2-.2l.2-.1a2 2 0 1 1 4 0l.2.1c.4.2.8.3 1.2.2.4-.1.8-.3 1.1-.6l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1c-.3.3-.5.7-.6 1.1-.1.4 0 .9.2 1.2l.1.2a2 2 0 1 1 0 4l-.1.2c-.2.4-.3.8-.2 1.2Z"/></svg><span>Set</span></button>
  </nav>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, query, orderBy, limit, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

const firebaseConfig={apiKey:'AIzaSyAqmTEKnLKOXcmOoR9RrXksNe5_Fix42w8',authDomain:'rocky-fd14b.firebaseapp.com',projectId:'rocky-fd14b',storageBucket:'rocky-fd14b.firebasestorage.app',messagingSenderId:'861954349314',appId:'1:861954349314:web:bb8384825daedb8d34ca1b'};
const app=initializeApp(firebaseConfig), db=getFirestore(app);
const SESSION='rocky_admin_compact_session_v1', ADMIN=['admin'];
const DEFAULT_BONUS={transactionBonusRate:.015,closingBonusPerMinute:100};
const state={user:null,page:'dashboard',userFilter:'all',dateFilter:todayKey(),monthFilter:monthKey(),txLimit:50,attLimit:50,trash:false,data:{users:[],transactions:[],attendance:[],bonus:{...DEFAULT_BONUS}}};
const $=id=>document.getElementById(id), page=$('page');
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function userKey(v){return String(v||'').trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\-.]/g,'')}
function rp(v){return Number(v||0).toLocaleString('id-ID')}
function parts(d=new Date()){return Object.fromEntries(new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jakarta',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}).formatToParts(d).map(p=>[p.type,p.value]))}
function todayKey(d=new Date()){const p=parts(d);return `${p.year}-${p.month}-${p.day}`}
function monthKey(d=new Date()){return todayKey(d).slice(0,7)}
function timeNow(){const p=parts();return `${p.hour}:${p.minute}`}
function dateID(k){if(!k)return '-';const [y,m,d]=String(k).split('-');return `${d}/${m}/${y}`}
function ms(r){const n=Number(r?.createdAtMs||r?.updatedAtMs||r?.deletedAtMs||0);if(n)return n;const t=r?.createdAt||r?.updatedAt||r?.deletedAt;if(t?.toMillis)return t.toMillis();if(t?.seconds)return t.seconds*1000;return 0}
function timeID(m){if(!m)return '--:--';const p=parts(new Date(m));return `${p.hour}:${p.minute}`}
function deleted(x){return x?.deleted===true||x?.deleted==='true'}
function isActive(u){return u && u.active!==false && !deleted(u)}
function isAdmin(u){return userKey(u?.role)==='admin'||ADMIN.includes(userKey(u?.username||u?.id))}
function users(activeOnly=true){let arr=state.data.users;if(activeOnly)arr=arr.filter(isActive);return [...arr].sort((a,b)=>String(a.name||a.username).localeCompare(String(b.name||b.username),'id'))}
function staff(){return users().filter(u=>!isAdmin(u))}
function bonusPct(u){const p=Number(u?.dailyBonusPercent ?? (Number(u?.dailyBonusRate||0)*100));return Number.isFinite(p)&&p>=0?p:0}
function bonusRate(u){const r=Number(u?.dailyBonusRate);if(Number.isFinite(r)&&r>=0)return r;return bonusPct(u)/100}
function globalBonusPct(){return Number((Number(state.data.bonus?.transactionBonusRate||0)*100).toFixed(3))}
function getUser(u){const k=userKey(u);return state.data.users.find(x=>userKey(x.username||x.id)===k)}
function txDate(t){return String(t.dateKey||(ms(t)?todayKey(new Date(ms(t))):'')).slice(0,10)}
function txMonth(t){return String(t.monthKey||txDate(t).slice(0,7))}
function attDate(a){return String(a.dateKey||(ms(a)?todayKey(new Date(ms(a))):'')).slice(0,10)}
function showLoad(v){$('loading').style.display=v?'flex':'none'}
function toast(msg){const t=$('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',1900)}
function modal(title,body,actions=''){const r=$('modal');r.innerHTML=`<div class="modal"><div class="modal-head"><div><div class="modal-title">${esc(title)}</div></div><button class="icon" onclick="closeModal()">×</button></div>${body}${actions?`<div class="modal-actions">${actions}</div>`:''}</div>`;r.classList.add('show')}
function closeModal(){const r=$('modal');r.classList.remove('show');r.innerHTML=''}
window.closeModal=closeModal;
async function loadAll(){showLoad(true);try{const [us,tx,at,bs]=await Promise.all([getDocs(collection(db,'users')),getDocs(query(collection(db,'transactions'),orderBy('createdAtMs','desc'),limit(350))),getDocs(query(collection(db,'attendance'),orderBy('createdAtMs','desc'),limit(350))),getDoc(doc(db,'closings','__bonus_settings'))]);state.data.users=us.docs.map(d=>({id:d.id,username:d.data().username||d.id,...d.data()}));state.data.transactions=tx.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>ms(b)-ms(a));state.data.attendance=at.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>ms(b)-ms(a));state.data.bonus=bs.exists()?{...DEFAULT_BONUS,...bs.data()}:{...DEFAULT_BONUS};}catch(e){console.error(e);toast('Gagal load data. Cek koneksi / rules Firebase.')}showLoad(false);render()}
function top(title,sub){return `<div class="top"><div class="brand"><div class="title">${esc(title)}</div><div class="sub">${esc(sub||'Admin: '+(state.user?.name||'-'))}</div></div><div class="row"><button class="btn sm" onclick="refresh()">Refresh</button><button class="btn sm danger" onclick="logout()">Keluar</button></div></div>`}
function nav(){const n=$('nav'),f=$('fab');if(!state.user){n.style.display='none';f.style.display='none';return}n.style.display='flex';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));$(`nav-${state.page}`)?.classList.add('active');f.style.display=state.page==='transactions'?'block':'none'}
function renderLogin(){nav();page.innerHTML=`<div class="login"><div class="login-card"><div class="hero" style="text-align:center"><div class="big">PANEL ADMIN</div></div><div class="card" style="margin-top:10px"><div class="field"><div class="label">Username Admin</div><input id="lu" autocomplete="username" placeholder="admin"></div><div class="field"><div class="label">PIN</div><input id="lp" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="PIN"></div><button class="btn primary block" onclick="login()">Masuk</button></div></div></div>`}
function render(){if(!state.user)return renderLogin();nav();if(state.page==='dashboard')return dashboard();if(state.page==='transactions')return transactions();if(state.page==='attendance')return attendance();if(state.page==='users')return userPage();return settings()}
function visibleTx(){return state.data.transactions.filter(t=>state.trash?deleted(t):!deleted(t))}
function visibleAtt(){return state.data.attendance.filter(a=>state.trash?deleted(a):!deleted(a))}
function dashboard(){const today=todayKey(), month=monthKey();const tx=visibleTx().filter(t=>!deleted(t));const todayTx=tx.filter(t=>txDate(t)===today);const monthTx=tx.filter(t=>txMonth(t)===month);const todayTotal=todayTx.reduce((s,t)=>s+Number(t.amount||0),0);const monthTotal=monthTx.reduce((s,t)=>s+Number(t.amount||0),0);const bonusMonth=Math.round(monthTx.reduce((s,t)=>{const u=getUser(t.user);const r=bonusRate(u)||Number(state.data.bonus.transactionBonusRate||0);return s+(Number(t.amount||0)*r)},0));const absToday=visibleAtt().filter(a=>attDate(a)===today&&!deleted(a));const byUser=staff().map(u=>{const arr=todayTx.filter(t=>userKey(t.user)===userKey(u.username||u.id));return {u,total:arr.reduce((s,t)=>s+Number(t.amount||0),0),count:arr.length}}).filter(x=>x.total||x.count).sort((a,b)=>b.total-a.total);page.innerHTML=`${top('Dashboard','Ringkasan compact')}
<div class="hero"><div class="kicker">Omset Hari Ini</div><div class="big">Rp ${rp(todayTotal)}</div><div class="sub">${dateID(today)} · ${todayTx.length} transaksi</div></div>
<div class="grid2" style="margin-top:8px"><div class="stat"><div class="stat-label">Omset Bulan</div><div class="stat-val">Rp ${rp(monthTotal)}</div><div class="stat-foot">${monthTx.length} transaksi</div></div><div class="stat"><div class="stat-label">Absen Hari Ini</div><div class="stat-val">${absToday.length}</div><div class="stat-foot">dari ${staff().length} staff</div></div><div class="stat"><div class="stat-label">User Aktif</div><div class="stat-val">${users().length}</div><div class="stat-foot">admin + staff</div></div><div class="stat"><div class="stat-label">Bonus Bulan</div><div class="stat-val">Rp ${rp(bonusMonth)}</div><div class="stat-foot">rate global ${globalBonusPct()}%</div></div></div>
<div class="card" style="margin-top:8px"><div class="between"><b>Ranking Hari Ini</b><span class="pill blue">${byUser.length} user</span></div><div class="list" style="margin-top:8px">${byUser.length?byUser.map(x=>`<div class="item"><div class="main"><div class="item-title">${esc(x.u.name||x.u.username)}</div><div class="item-sub">${x.count} transaksi</div></div><div class="amount">Rp ${rp(x.total)}</div></div>`).join(''):'<div class="empty">Belum ada transaksi hari ini.</div>'}</div></div>`}
function userOpts(sel='all',all=true,admin=false){const arr=admin?users():staff();return `${all?`<option value="all" ${sel==='all'?'selected':''}>Semua user</option>`:''}${arr.map(u=>`<option value="${esc(userKey(u.username||u.id))}" ${userKey(sel)===userKey(u.username||u.id)?'selected':''}>${esc(u.name||u.username)} (@${esc(u.username||u.id)})</option>`).join('')}`}
function transactions(){const all=visibleTx().filter(t=>(state.userFilter==='all'||userKey(t.user)===state.userFilter)&&(!state.dateFilter||txDate(t)===state.dateFilter));const total=all.reduce((s,t)=>s+Number(t.amount||0),0);const show=all.slice(0,state.txLimit);page.innerHTML=`${top('Transaksi',state.trash?'Data terhapus':'Tambah, edit, hapus')}
<div class="hero"><div class="kicker">Total Filter</div><div class="big">Rp ${rp(total)}</div><div class="sub">${all.length} transaksi · ${dateID(state.dateFilter)}</div></div>
<div class="filters"><select id="fu" onchange="setUserFilter(this.value)">${userOpts(state.userFilter,true)}</select><input id="fd" type="date" value="${esc(state.dateFilter)}" onchange="setDateFilter(this.value)"></div>
<div class="grid2"><button class="btn primary" onclick="openTx()">+ Transaksi</button><button class="btn ${state.trash?'warn':''}" onclick="toggleTrash()">${state.trash?'Lihat Aktif':'Data Terhapus'}</button></div>
<div class="list" style="margin-top:8px">${show.length?show.map(txItem).join(''):'<div class="empty">Tidak ada transaksi.</div>'}</div>${all.length>show.length?`<button class="btn block" style="margin-top:8px" onclick="moreTx()">Tampilkan Lagi</button>`:''}`}
function txItem(t){const u=getUser(t.user);return `<div class="item"><div class="main"><div class="item-title">${esc(t.note||'Transaksi')}</div><div class="item-sub">${esc(u?.name||t.name||t.user||'-')} · ${dateID(txDate(t))} ${timeID(ms(t))}</div></div><div><div class="amount">Rp ${rp(t.amount)}</div><div class="actions" style="margin-top:5px;justify-content:flex-end">${deleted(t)?`<button class="icon" onclick="restoreTx('${esc(t.id)}')">↺</button>`:`<button class="icon" onclick="openTx('${esc(t.id)}')">✎</button><button class="icon" onclick="delTx('${esc(t.id)}')">🗑</button>`}</div></div></div>`}
function attendance(){const all=visibleAtt().filter(a=>(state.userFilter==='all'||userKey(a.user)===state.userFilter)&&(!state.dateFilter||attDate(a)===state.dateFilter));const show=all.slice(0,state.attLimit);page.innerHTML=`${top('Absen',state.trash?'Data terhapus':'Tambah, edit, hapus absen')}
<div class="grid2"><div class="stat"><div class="stat-label">Absen Filter</div><div class="stat-val">${all.length}</div><div class="stat-foot">${dateID(state.dateFilter)}</div></div><div class="stat"><div class="stat-label">Staff Aktif</div><div class="stat-val">${staff().length}</div><div class="stat-foot">Tidak termasuk admin</div></div></div>
<div class="filters"><select onchange="setUserFilter(this.value)">${userOpts(state.userFilter,true)}</select><input type="date" value="${esc(state.dateFilter)}" onchange="setDateFilter(this.value)"></div>
<div class="grid2"><button class="btn primary" onclick="openAtt()">+ Absen</button><button class="btn ${state.trash?'warn':''}" onclick="toggleTrash()">${state.trash?'Lihat Aktif':'Data Terhapus'}</button></div>
<div class="list" style="margin-top:8px">${show.length?show.map(attItem).join(''):'<div class="empty">Tidak ada absen.</div>'}</div>${all.length>show.length?`<button class="btn block" style="margin-top:8px" onclick="moreAtt()">Tampilkan Lagi</button>`:''}`}
function attItem(a){const u=getUser(a.user);return `<div class="item"><div class="main"><div class="item-title">${esc(u?.name||a.name||a.user||'-')}</div><div class="item-sub">${dateID(attDate(a))} · ${timeID(ms(a))}${a.lat?' · GPS':''}</div></div><div class="actions">${deleted(a)?`<button class="icon" onclick="restoreAtt('${esc(a.id)}')">↺</button>`:`<button class="icon" onclick="openAtt('${esc(a.id)}')">✎</button><button class="icon" onclick="delAtt('${esc(a.id)}')">🗑</button>`}</div></div>`}
function userPage(){const arr=state.trash?state.data.users.filter(deleted):users();page.innerHTML=`${top('User',state.trash?'User nonaktif':'Tambah, edit user')}
<div class="grid2"><div class="stat"><div class="stat-label">User Aktif</div><div class="stat-val">${users().length}</div><div class="stat-foot">termasuk admin</div></div><div class="stat"><div class="stat-label">Staff</div><div class="stat-val">${staff().length}</div><div class="stat-foot">staff aktif</div></div></div>
<div class="grid2" style="margin-top:8px"><button class="btn primary" onclick="openUser()">+ User</button><button class="btn ${state.trash?'warn':''}" onclick="toggleTrash()">${state.trash?'Lihat Aktif':'User Nonaktif'}</button></div>
<div class="list" style="margin-top:8px">${arr.length?arr.map(userItem).join(''):'<div class="empty">Tidak ada user.</div>'}</div>`}
function userItem(u){const k=userKey(u.username||u.id);return `<div class="item"><div class="main"><div class="item-title">${esc(u.name||k)}</div><div class="item-sub">@${esc(k)} · ${esc(u.role||'staff')} · Bonus ${bonusPct(u)||globalBonusPct()}% · PIN ${String(u.pin||'').replace(/./g,'•')}</div></div><span class="pill ${isAdmin(u)?'blue':'green'}">${isAdmin(u)?'Admin':'Staff'}</span><div class="actions">${deleted(u)?`<button class="icon" onclick="restoreUser('${esc(k)}')">↺</button>`:`<button class="icon" onclick="openUser('${esc(k)}')">✎</button><button class="icon" onclick="deactUser('${esc(k)}')">🗑</button>`}</div></div>`}
function settings(){const b=state.data.bonus||DEFAULT_BONUS;const bonusUsers=staff();page.innerHTML=`${top('Setelan','Edit bonus + versi ringan')}
<div class="card"><b>Edit Bonus Global</b><div class="hint" style="margin:6px 0 9px">Tersimpan di Firestore: <b>closings/__bonus_settings</b>. Ini ringan, cuma dibaca saat login/refresh.</div><div class="grid2"><div class="field"><div class="label">Bonus Transaksi (%)</div><input id="bonus-trx" inputmode="decimal" value="${esc(globalBonusPct())}" placeholder="1.5"></div><div class="field"><div class="label">Bonus Closing / Menit</div><input id="bonus-closing" inputmode="numeric" value="${esc(Number(b.closingBonusPerMinute||0))}" placeholder="100"></div></div><button class="btn primary block" onclick="saveBonusSettings()">Simpan Bonus Global</button></div>
<div class="card" style="margin-top:8px"><div class="between"><b>Bonus Per User</b><span class="pill blue">${bonusUsers.length} staff</span></div><div class="hint" style="margin:6px 0 9px">Kalau bonus user diisi 0, dashboard pakai bonus global. Klik edit untuk atur bonus khusus user.</div><div class="list">${bonusUsers.length?bonusUsers.map(u=>`<div class="item"><div class="main"><div class="item-title">${esc(u.name||u.username)}</div><div class="item-sub">@${esc(u.username||u.id)} · bonus ${bonusPct(u)||globalBonusPct()}%</div></div><button class="btn sm" onclick="openUserBonus('${esc(userKey(u.username||u.id))}')">Edit</button></div>`).join(''):'<div class="empty">Belum ada staff.</div>'}</div></div>
<div class="card" style="margin-top:8px"><b>Mode Compact Ringan</b><div class="hint" style="margin-top:6px">Yang dibuang: realtime listener semua collection, grafik 7 hari, audit log realtime, SheetJS/Excel export, font Google, Font Awesome, background/animasi berat. Menu bonus ini tetap ringan karena manual refresh.</div></div>
<div class="card" style="margin-top:8px"><b>Backup JSON Ringan</b><div class="hint" style="margin:6px 0 9px">Backup dari data yang sedang terbaca di aplikasi ini.</div><button class="btn success block" onclick="backupJson()">Download Backup JSON</button></div>
<div class="card" style="margin-top:8px"><b>Load Data</b><div class="hint" style="margin:6px 0 9px">Aplikasi tidak realtime supaya ringan. Tekan refresh jika ingin ambil data terbaru.</div><button class="btn primary block" onclick="refresh()">Refresh Sekarang</button></div>`}
async function pinAsk(msg='Masukkan PIN admin'){return new Promise(res=>{window.__pin=v=>{closeModal();delete window.__pin;res(String(v||''))};modal('Verifikasi PIN',`<div class="hint" style="margin-bottom:8px">${esc(msg)}</div><input id="pinx" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="PIN" style="text-align:center;font-size:22px;font-weight:900">`,`<button class="btn" onclick="__pin('')">Batal</button><button class="btn primary" onclick="__pin(document.getElementById('pinx').value)">Lanjut</button>`);setTimeout(()=>$('pinx')?.focus(),60)})}
async function needPin(msg){const p=await pinAsk(msg);if(!p)return false;if(String(p)!==String(state.user?.pin||'')){toast('PIN salah');return false}return true}
async function confirmPin(msg){return await needPin(msg)}
window.login=async function(){const u=userKey($('lu')?.value), p=String($('lp')?.value||'');if(!u||!p)return toast('Isi username dan PIN');showLoad(true);try{const snap=await getDoc(doc(db,'users',u));if(!snap.exists()){toast('User tidak ditemukan');showLoad(false);return}const data={id:snap.id,username:snap.data().username||snap.id,...snap.data()};if(!isAdmin(data)){toast('Khusus admin');showLoad(false);return}if(!isActive(data)){toast('Admin nonaktif');showLoad(false);return}if(String(data.pin)!==p){toast('PIN salah');showLoad(false);return}state.user=data;localStorage.setItem(SESSION,JSON.stringify({username:u,pin:p}));await loadAll();}catch(e){console.error(e);toast('Login gagal. Cek internet/rules Firebase.');showLoad(false)}};
window.logout=function(){localStorage.removeItem(SESSION);state.user=null;state.data={users:[],transactions:[],attendance:[],bonus:{...DEFAULT_BONUS}};renderLogin()};
window.refresh=loadAll;window.go=function(p){state.page=p;state.trash=false;render()};window.setUserFilter=v=>{state.userFilter=v;render()};window.setDateFilter=v=>{state.dateFilter=v;render()};window.toggleTrash=()=>{state.trash=!state.trash;render()};window.moreTx=()=>{state.txLimit+=50;render()};window.moreAtt=()=>{state.attLimit+=50;render()};
window.openTx=function(id=''){const t=id?state.data.transactions.find(x=>x.id===id):null;modal(id?'Edit Transaksi':'Tambah Transaksi',`<div class="field"><div class="label">User</div><select id="txu">${userOpts(userKey(t?.user||state.userFilter),false)}</select></div><div class="field"><div class="label">Nominal</div><input id="txa" inputmode="numeric" pattern="[0-9]*" value="${esc(t?.amount||'')}" placeholder="0" style="text-align:right;font-size:22px;font-weight:900"></div><div class="field"><div class="label">Catatan</div><input id="txn" value="${esc(t?.note||'')}" placeholder="Catatan"></div><div class="field"><div class="label">Tanggal</div><input id="txd" type="date" value="${esc(t?txDate(t):todayKey())}"></div>`,`<button class="btn" onclick="closeModal()">Batal</button><button class="btn primary" onclick="saveTx('${esc(id)}')">Simpan</button>`)};
window.saveTx=async function(id=''){const u=userKey($('txu')?.value), user=getUser(u), amount=Number(String($('txa')?.value||'').replace(/\D/g,'')), note=String($('txn')?.value||'').trim()||'Transaksi', date=String($('txd')?.value||todayKey()).slice(0,10);if(!user)return toast('User tidak valid');if(!amount)return toast('Nominal wajib diisi');if(id && !(await confirmPin('Simpan edit transaksi?')))return;showLoad(true);try{const payload={user:u,name:user.name||u,amount,note,dateKey:date,monthKey:date.slice(0,7),deleted:false,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username};if(id)await setDoc(doc(db,'transactions',id),payload,{merge:true});else await addDoc(collection(db,'transactions'),{...payload,createdAt:serverTimestamp(),createdAtMs:Date.now(),createdBy:state.user.username});closeModal();toast('Tersimpan');await loadAll()}catch(e){console.error(e);toast('Gagal simpan')}showLoad(false)};
window.delTx=async id=>{if(!(await confirmPin('Hapus transaksi ini?')))return;showLoad(true);try{await setDoc(doc(db,'transactions',id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username},{merge:true});toast('Transaksi dihapus');await loadAll()}catch(e){console.error(e);toast('Gagal hapus')}showLoad(false)};
window.restoreTx=async id=>{if(!(await confirmPin('Restore transaksi?')))return;showLoad(true);try{await setDoc(doc(db,'transactions',id),{deleted:false,restoredAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username},{merge:true});toast('Direstore');await loadAll()}catch(e){toast('Gagal restore')}showLoad(false)};
window.openAtt=function(id=''){const a=id?state.data.attendance.find(x=>x.id===id):null;modal(id?'Edit Absen':'Tambah Absen',`<div class="field"><div class="label">User</div><select id="abu">${userOpts(userKey(a?.user||state.userFilter),false)}</select></div><div class="field"><div class="label">Tanggal</div><input id="abd" type="date" value="${esc(a?attDate(a):todayKey())}"></div><div class="field"><div class="label">Jam WIB</div><input id="abt" type="time" value="${esc(a?timeID(ms(a)):timeNow())}"></div>`,`<button class="btn" onclick="closeModal()">Batal</button><button class="btn primary" onclick="saveAtt('${esc(id)}')">Simpan</button>`)};
window.saveAtt=async function(id=''){const u=userKey($('abu')?.value), user=getUser(u), date=String($('abd')?.value||todayKey()).slice(0,10), tm=String($('abt')?.value||timeNow()).slice(0,5);if(!user)return toast('User tidak valid');if(id && !(await confirmPin('Simpan edit absen?')))return;const m=Date.parse(`${date}T${tm}:00+07:00`);showLoad(true);try{const payload={user:u,name:user.name||u,dateKey:date,createdAt:Timestamp.fromMillis(m),createdAtMs:m,manual:true,deleted:false,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username};if(id)await setDoc(doc(db,'attendance',id),payload,{merge:true});else await addDoc(collection(db,'attendance'),{...payload,createdBy:state.user.username});closeModal();toast('Absen tersimpan');await loadAll()}catch(e){console.error(e);toast('Gagal simpan absen')}showLoad(false)};
window.delAtt=async id=>{if(!(await confirmPin('Hapus absen ini?')))return;showLoad(true);try{await setDoc(doc(db,'attendance',id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username},{merge:true});toast('Absen dihapus');await loadAll()}catch(e){toast('Gagal hapus')}showLoad(false)};
window.restoreAtt=async id=>{if(!(await confirmPin('Restore absen?')))return;showLoad(true);try{await setDoc(doc(db,'attendance',id),{deleted:false,restoredAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username},{merge:true});toast('Direstore');await loadAll()}catch(e){toast('Gagal restore')}showLoad(false)};
window.openUser=function(k=''){const u=k?getUser(k):null;modal(k?'Edit User':'Tambah User',`<div class="field"><div class="label">Username</div><input id="usu" value="${esc(u?.username||k||'')}" ${k?'disabled':''} placeholder="username"></div><div class="field"><div class="label">Nama</div><input id="usn" value="${esc(u?.name||'')}" placeholder="Nama"></div><div class="field"><div class="label">PIN</div><input id="usp" inputmode="numeric" pattern="[0-9]*" value="${esc(u?.pin||'')}" placeholder="PIN"></div><div class="field"><div class="label">Role</div><select id="usr"><option value="staff" ${userKey(u?.role||'staff')==='staff'?'selected':''}>Staff</option><option value="harian" ${userKey(u?.role)==='harian'?'selected':''}>Harian</option><option value="admin" ${isAdmin(u)?'selected':''}>Admin</option></select></div><div class="field"><div class="label">Bonus Khusus User (%)</div><input id="usb" inputmode="decimal" value="${esc(bonusPct(u))}" placeholder="0 = ikut global"></div>`,`<button class="btn" onclick="closeModal()">Batal</button><button class="btn primary" onclick="saveUser('${esc(k)}')">Simpan</button>`)};
window.saveUser=async function(old=''){const u=userKey($('usu')?.value), name=String($('usn')?.value||'').trim(), pin=String($('usp')?.value||'').replace(/\D/g,''), role=userKey($('usr')?.value||'staff'), bonus=Number(String($('usb')?.value||'0').replace(',','.'));if(!u||!name||!pin)return toast('Data user belum lengkap');if(old && !(await confirmPin('Simpan edit user?')))return;showLoad(true);try{await setDoc(doc(db,'users',u),{username:u,name,pin,role,dailyBonusPercent:Number.isFinite(bonus)&&bonus>=0?bonus:0,dailyBonusRate:(Number.isFinite(bonus)&&bonus>=0?bonus:0)/100,active:true,deleted:false,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username,...(!old?{createdAt:serverTimestamp(),createdAtMs:Date.now(),createdBy:state.user.username}:{})},{merge:true});closeModal();toast('User tersimpan');await loadAll()}catch(e){console.error(e);toast('Gagal simpan user')}showLoad(false)};
window.deactUser=async k=>{if(userKey(k)===userKey(state.user.username))return toast('Tidak bisa hapus akun sendiri');if(!(await confirmPin('Nonaktifkan user?')))return;showLoad(true);try{await setDoc(doc(db,'users',k),{active:false,deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username},{merge:true});toast('User nonaktif');await loadAll()}catch(e){toast('Gagal nonaktifkan')}showLoad(false)};
window.restoreUser=async k=>{if(!(await confirmPin('Aktifkan user lagi?')))return;showLoad(true);try{await setDoc(doc(db,'users',k),{active:true,deleted:false,restoredAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username},{merge:true});toast('User aktif lagi');await loadAll()}catch(e){toast('Gagal restore user')}showLoad(false)};
window.saveBonusSettings=async function(){const trx=Number(String($('bonus-trx')?.value||'0').replace(',','.'));const close=Number(String($('bonus-closing')?.value||'0').replace(/[^0-9.]/g,''));if(!Number.isFinite(trx)||trx<0)return toast('Bonus transaksi tidak valid');if(!Number.isFinite(close)||close<0)return toast('Bonus closing tidak valid');if(!(await confirmPin('Simpan pengaturan bonus global?')))return;showLoad(true);try{await setDoc(doc(db,'closings','__bonus_settings'),{transactionBonusRate:trx/100,closingBonusPerMinute:Math.round(close),updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username},{merge:true});toast('Bonus global tersimpan');await loadAll()}catch(e){console.error(e);toast('Gagal simpan bonus')}showLoad(false)};
window.openUserBonus=function(k){const u=getUser(k);if(!u)return toast('User tidak ditemukan');modal('Edit Bonus User',`<div class="field"><div class="label">User</div><input value="${esc(u.name||u.username)} (@${esc(u.username||u.id)})" disabled></div><div class="field"><div class="label">Bonus Khusus User (%)</div><input id="user-bonus-only" inputmode="decimal" value="${esc(bonusPct(u))}" placeholder="0 = ikut bonus global"></div><div class="hint">Isi 0 kalau user ini mau ikut bonus global ${globalBonusPct()}%.</div>`,`<button class="btn" onclick="closeModal()">Batal</button><button class="btn primary" onclick="saveUserBonus('${esc(k)}')">Simpan</button>`)};
window.saveUserBonus=async function(k){const u=getUser(k);const pct=Number(String($('user-bonus-only')?.value||'0').replace(',','.'));if(!u)return toast('User tidak ditemukan');if(!Number.isFinite(pct)||pct<0)return toast('Bonus user tidak valid');if(!(await confirmPin('Simpan bonus user?')))return;showLoad(true);try{await setDoc(doc(db,'users',k),{dailyBonusPercent:pct,dailyBonusRate:pct/100,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:state.user.username},{merge:true});closeModal();toast('Bonus user tersimpan');await loadAll()}catch(e){console.error(e);toast('Gagal simpan bonus user')}showLoad(false)};
window.backupJson=function(){const out={exportedAt:new Date().toISOString(),note:'Rocky Hijab Admin Compact - backup data yang sedang terbaca',users:state.data.users,transactions:state.data.transactions,attendance:state.data.attendance,bonus:state.data.bonus};const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`rocky_admin_backup_${todayKey()}.json`;a.click();URL.revokeObjectURL(a.href)};
async function boot(){try{const s=JSON.parse(localStorage.getItem(SESSION)||'null');if(s?.username&&s?.pin){const snap=await getDoc(doc(db,'users',userKey(s.username)));if(snap.exists()){const u={id:snap.id,username:snap.data().username||snap.id,...snap.data()};if(isAdmin(u)&&isActive(u)&&String(u.pin)===String(s.pin)){state.user=u;await loadAll();return}}}}catch(e){}renderLogin()}
boot();
</script>
</body>
</html>
