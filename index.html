    .login{min-height:100vh;display:grid;place-items:center;padding:18px}.login-card{width:min(390px,100%);padding:16px}.login-card h1{font-size:24px}.login-card .logo{width:58px;height:58px;border-radius:20px;font-size:22px;margin-bottom:12px}.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:2px 5px;color:var(--soft)}.empty{padding:20px 12px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px;background:var(--chip)}
    .bottom-nav{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(520px,calc(100% - 20px));height:62px;background:rgba(13,19,32,.86);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:22px;display:none;gap:6px;padding:6px;box-shadow:var(--shadow);z-index:30}[data-theme="light"] .bottom-nav{background:rgba(255,255,255,.86)}.bottom-nav button{flex:1;border:0;background:transparent;color:var(--muted);border-radius:16px;font-weight:950;font-size:10px;display:grid;place-items:center}.bottom-nav button.on{background:rgba(93,143,255,.15);color:var(--accent)}.load{position:fixed;inset:0;z-index:90;display:none;place-items:center;background:rgba(2,6,23,.45);backdrop-filter:blur(10px)}.spinner{width:42px;height:42px;border-radius:99px;border:3px solid var(--line);border-top-color:var(--accent);animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

    /* Android Home Revenue Chart */
    .home-hero{display:grid;grid-template-columns:1.15fr .85fr;gap:8px}

    .recent-compact{display:grid;gap:7px}

    @media(max-width:760px){.wrap{padding:9px 8px 96px}.grid{grid-template-columns:repeat(2,1fr);gap:7px}.controls{grid-template-columns:1fr 1fr}.controls .wide{grid-column:1/-1}.bar{align-items:flex-start}.brand{flex:1}.desk{display:none}.row{grid-template-columns:1fr}.row-actions{justify-content:flex-start}.form-grid{grid-template-columns:1fr}.split{grid-template-columns:1fr}.bottom-nav{display:flex;height:72px;border-radius:24px;padding:7px}.bottom-nav button{font-size:11px;border-radius:18px}.tabs{display:none}.top{padding-top:8px}.num{font-size:20px}.home-hero{grid-template-columns:1fr}.hero-main{padding:16px}.hero-amount{font-size:30px}.hero-side{grid-template-columns:repeat(3,1fr);gap:7px}.mini-metric{padding:10px 8px;text-align:center}.mini-metric .num{font-size:17px}.chart-head{align-items:center}.chart-head h2{font-size:14px}.chart-total b{font-size:14px}.revenue-card{padding:10px 9px;border-radius:18px}.quick-actions .btn{min-height:46px}.section{margin-top:8px}}
    @media(max-width:380px){.hero-side{grid-template-columns:1fr 1fr}.hero-side .mini-metric:last-child{grid-column:1/-1}.hero-amount{font-size:27px}.chart-axis{font-size:16px}.chart-value{font-size:15px}.btn{padding-left:8px;padding-right:8px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <div id="loading" class="load"><div class="spinner"></div></div>
  <div id="editor" class="modal"><div class="sheet"><div id="editorBody"></div></div></div>
  <div id="rawModal" class="modal"><div class="sheet"><div id="rawBody"></div></div></div>
  <nav id="bottomNav" class="bottom-nav"></nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, addDoc, deleteDoc, onSnapshot, query, limit, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqmTEKnLKOXcmOoR9RrXksNe5_Fix42w8",
  authDomain: "rocky-fd14b.firebaseapp.com",
  projectId: "rocky-fd14b",
  storageBucket: "rocky-fd14b.firebasestorage.app",
  messagingSenderId: "861954349314",
  appId: "1:861954349314:web:bb8384825daedb8d34ca1b"
};

const SOURCE_CONST = {
  officeLat: -6.786168,
  officeLng: 106.780918,
  radiusMeter: 200,
  closingDeadline: '18:00',
  transactionBonusRate: 0.015,
  closingBonusPerMinute: 100,
  adminUsernames: ['admin']
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
try { await enableIndexedDbPersistence(db); } catch(e) { console.warn('Persistence off:', e.code || e.message); }

const SESSION = 'rocky_monitor_session_v1';
const COLL_NAMES = ['transactions','users','attendance','closings','audit_logs'];
const state = {
  user:null,page:'dashboard',coll:'transactions',limit:700,search:'',showDeleted:true,lastSync:null,
  docs:{transactions:[],users:[],attendance:[],closings:[],audit_logs:[]},
  bonus:{transactionBonusRate:SOURCE_CONST.transactionBonusRate,transactionBonusPercent:1.5,closingBonusPerMinute:SOURCE_CONST.closingBonusPerMinute},
  appSettings:null, unsub:[]
};

const metas = {
  transactions:{label:'Transaksi', icon:'💳', idMode:'auto', fields:[
    {k:'user',l:'User',t:'user',req:true},{k:'name',l:'Nama',t:'text'},{k:'amount',l:'Nominal',t:'number',req:true},{k:'note',l:'Catatan',t:'text'},
    {k:'dateKey',l:'Tanggal YYYY-MM-DD',t:'dateKey'},{k:'monthKey',l:'Bulan YYYY-MM',t:'monthKey'},{k:'deleted',l:'Deleted',t:'bool'}]},
  users:{label:'User', icon:'👤', idMode:'username', fields:[
    {k:'username',l:'Username / ID dokumen',t:'username',req:true},{k:'name',l:'Nama',t:'text',req:true},{k:'pin',l:'PIN',t:'text',req:true},
    {k:'role',l:'Role',t:'select',opts:['staff','admin','harian'],req:true},{k:'active',l:'Aktif',t:'bool'},{k:'dailyBonusPercent',l:'Bonus Harian %',t:'number'},{k:'deleted',l:'Deleted',t:'bool'}]},
  attendance:{label:'Absensi', icon:'📍', idMode:'auto', fields:[
    {k:'user',l:'User',t:'user',req:true},{k:'name',l:'Nama',t:'text'},{k:'dateKey',l:'Tanggal YYYY-MM-DD',t:'dateKey'},
    {k:'monthKey',l:'Bulan YYYY-MM',t:'monthKey'},{k:'inside',l:'Dalam Radius',t:'bool'},{k:'distance',l:'Jarak Meter',t:'number'},
    {k:'lat',l:'Latitude',t:'number'},{k:'lng',l:'Longitude',t:'number'},{k:'deleted',l:'Deleted',t:'bool'}]},
  closings:{label:'Closing', icon:'🔒', idMode:'manual', fields:[
    {k:'id',l:'Doc ID',t:'docid'},{k:'dateKey',l:'Tanggal YYYY-MM-DD',t:'dateKey'},{k:'monthKey',l:'Bulan YYYY-MM',t:'monthKey'},
    {k:'scope',l:'Scope',t:'select',opts:['global','user']},{k:'user',l:'User',t:'userOptional'},{k:'name',l:'Nama User',t:'text'},
    {k:'closed',l:'Closed',t:'bool'},{k:'canceled',l:'Canceled',t:'bool'},{k:'actualClosingTime',l:'Jam Closing',t:'text'},
    {k:'deadline',l:'Deadline',t:'text'},{k:'delayMinutes',l:'Telat Menit',t:'number'},{k:'bonusPerMinute',l:'Bonus/Menit',t:'number'},
    {k:'bonusPerUser',l:'Bonus/User',t:'number'},{k:'totalUsers',l:'Total User',t:'number'},{k:'totalBonus',l:'Total Bonus',t:'number'}]},
  audit_logs:{label:'Audit Logs', icon:'🧾', idMode:'auto', fields:[
    {k:'action',l:'Action',t:'text',req:true},{k:'actor',l:'Actor',t:'text'},{k:'actorName',l:'Actor Name',t:'text'},{k:'detail',l:'Detail JSON',t:'json'},{k:'deleted',l:'Deleted',t:'bool'}]}
};

const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('id-ID').format(Number(n||0));
const money = n => 'Rp ' + fmt(n);
const now = () => new Date();
const pad = n => String(n).padStart(2,'0');
const dateKey = (d=now()) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const monthKey = (d=now()) => `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
const esc = s => String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const isAdmin = () => !!state.user && (state.user.role === 'admin' || SOURCE_CONST.adminUsernames.includes(String(state.user.username||'').toLowerCase()));
const cleanUser = u => String(u||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
const list = coll => state.docs[coll] || [];
const activeUsers = () => list('users').filter(u => u.active !== false && u.deleted !== true).sort((a,b)=>String(a.name||a.username).localeCompare(String(b.name||b.username)));
const userBy = username => list('users').find(u => cleanUser(u.username || u.id) === cleanUser(username));
const getMs = x => Number(x?.createdAtMs || x?.closedAtMs || x?.updatedAtMs || x?.deletedAtMs || x?.idMs || 0);
function toast(msg, err=false){const t=$('toast'); t.textContent=msg; t.className='toast show'+(err?' err':''); clearTimeout(toast._t); toast._t=setTimeout(()=>t.className='toast'+(err?' err':''),2300)}
function loading(v){$('loading').style.display=v?'grid':'none'}

function plain(v){
  if (v == null || ['string','number','boolean'].includes(typeof v)) return v;
  if (typeof v.toDate === 'function') return {__timestampMs:v.toDate().getTime()};
  if (Array.isArray(v)) return v.map(plain);
  if (typeof v === 'object') { const o={}; for (const [k,val] of Object.entries(v)) o[k]=plain(val); return o; }
  return String(v);
}
function revive(v){
  if (v == null || ['string','number','boolean'].includes(typeof v)) return v;
  if (Array.isArray(v)) return v.map(revive);
  if (typeof v === 'object') {
    if (Object.keys(v).length === 1 && typeof v.__timestampMs === 'number') return Timestamp.fromMillis(v.__timestampMs);
    const o={}; for (const [k,val] of Object.entries(v)) o[k]=revive(val); return o;
  }
  return v;
}
function normalizeDoc(snap){ return { id:snap.id, ...snap.data() }; }

function navHtml(){
  const items=[['dashboard','Home','⌁'],['data','Data','▦'],['settings','Setelan','⚙'],['logs','Log','☰']];
  return items.map(([p,l,i])=>`<button class="tab ${state.page===p?'on':''}" data-page="${p}">${i} ${l}</button>`).join('');
}
function bottomNav(){
  $('bottomNav').style.display='';
  $('bottomNav').innerHTML = [['dashboard','Home'],['data','Data'],['settings','Setelan'],['logs','Log']].map(([p,l])=>`<button class="${state.page===p?'on':''}" data-page="${p}">${l}</button>`).join('');
  $('bottomNav').querySelectorAll('button').forEach(b=>b.onclick=()=>go(b.dataset.page));
}
function shell(content){
  const online = navigator.onLine;
  return `<div class="wrap"><div class="top"><div class="bar"><div class="brand"><div class="logo">R</div><div><h1>Rocky Monitor</h1><div class="sub">${esc(state.user?.name||'')} @${esc(state.user?.username||'')} · ${isAdmin()?'Admin edit aktif':'Readonly / staff'}</div></div></div><div class="spacer"></div><span class="pill desk"><span class="dot ${online?'ok':'bad'}"></span>${online?'Online':'Offline'}</span><button class="btn icon" id="themeBtn" title="Theme">◐</button><button class="btn danger sm" id="logoutBtn">Keluar</button></div><div class="tabs">${navHtml()}</div></div>${content}</div>`;
}
function render(){
  if(!state.user) return renderLogin();
  let content = state.page==='dashboard'?renderDashboard():state.page==='data'?renderData():state.page==='settings'?renderSettings():renderLogs();
  $('app').innerHTML = shell(content);
  bindCommon(); bottomNav();
}
function bindCommon(){
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>go(b.dataset.page));
  $('logoutBtn')?.addEventListener('click', logout);
  $('themeBtn')?.addEventListener('click', ()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'; localStorage.setItem('rocky_monitor_theme',document.documentElement.dataset.theme)});
}
function go(p){state.page=p; render()}

function renderLogin(){
  $('bottomNav').innerHTML=''; $('bottomNav').style.display='none';
  $('app').innerHTML = `<div class="login"><div class="card login-card"><div class="logo">R</div><h1>Monitor Compact</h1><p class="tiny" style="margin:6px 0 14px">Masuk pakai user Firestore dari aplikasi utama. Admin bisa tambah/edit/hapus; staff otomatis readonly.</p><div class="field"><label>Username</label><input id="loginUser" class="input" autocomplete="username" placeholder="admin"></div><div class="field" style="margin-top:8px"><label>PIN</label><input id="loginPin" class="input" autocomplete="current-password" type="password" placeholder="PIN"></div><button id="loginBtn" class="btn primary" style="width:100%;margin-top:12px">Masuk Monitor</button><div class="tiny" style="margin-top:12px">Sumber config & collection mengikuti <span class="kbd">index.html</span> yang kamu kirim.</div></div></div>`;
  $('loginBtn').onclick=login; $('loginPin').addEventListener('keydown',e=>{if(e.key==='Enter') login()});
}
async function login(){
  const username = cleanUser($('loginUser').value); const pin = String($('loginPin').value||'').trim();
  if(!username || !pin) return toast('Isi username dan PIN', true);
  loading(true);
  try{
    const snap = await getDoc(doc(db,'users',username));
    if(!snap.exists()) throw new Error('User tidak ditemukan');
    const u = snap.data();
    if(u.active === false) throw new Error('User nonaktif');
    if(String(u.pin||'') !== pin) throw new Error('PIN salah');
    state.user = {username, name:u.name||username, pin:String(u.pin||''), role:u.role||'staff'};

async function startRealtime(){

  for(const name of COLL_NAMES){
    const q = query(collection(db,name), limit(Number(state.limit)||700));
    state.unsub.push(onSnapshot(q, snap=>{
      state.docs[name] = snap.docs.map(normalizeDoc).sort((a,b)=>getMs(b)-getMs(a));
      if(name==='closings') readBonusFromClosings();
      state.lastSync = new Date(); if(state.user) render();
    }, err=>toast(`${name}: ${err.message}`, true)));
  }
  try{
    const s = await getDoc(doc(db,'app_settings','main'));
    state.appSettings = s.exists() ? {id:s.id,...s.data()} : null;
  }catch(e){console.warn(e)}
}

function todayTx(){return list('transactions').filter(t=>t.dateKey===dateKey() && t.deleted!==true)}
function todayAtt(){return list('attendance').filter(a=>a.dateKey===dateKey() && a.deleted!==true)}
function lastNDays(n=7){
  const days=[];
  const base=new Date(); base.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){ const d=new Date(base); d.setDate(base.getDate()-i); days.push({date:d,key:dateKey(d),label:d.toLocaleDateString('id-ID',{weekday:'short'}).replace('.', ''),short:d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}); }
  return days;
}
function txMs(t){ return Number(t.createdAtMs || t.updatedAtMs || (t.createdAt?.toDate ? t.createdAt.toDate().getTime() : 0)); }
function revenue7Data(){
  const days=lastNDays(7).map(d=>({...d,total:0,count:0})); const byKey=Object.fromEntries(days.map(d=>[d.key,d]));
  for(const t of list('transactions')){
    if(t.deleted===true) continue;
    let k=String(t.dateKey||'');
    if(!k && txMs(t)) k=dateKey(new Date(txMs(t)));
    if(byKey[k]){ byKey[k].total += Number(t.amount||0); byKey[k].count += 1; }
  }
  return days;
}
function moneyShort(n){
  n=Number(n||0);
  if(n>=1000000000) return 'Rp '+(n/1000000000).toFixed(n%1000000000?1:0).replace('.', ',')+'M';
  if(n>=1000000) return 'Rp '+(n/1000000).toFixed(n%1000000?1:0).replace('.', ',')+'jt';
  if(n>=1000) return 'Rp '+Math.round(n/1000)+'rb';
  return 'Rp '+fmt(n);
}
function revenueChartSvg(days){
  const W=700,H=260,base=198,top=42,chartH=base-top,max=Math.max(1,...days.map(d=>d.total));
  const pts=days.map((d,i)=>{const x=56+i*((W-112)/6); const y=base-(d.total/max)*chartH; return {x,y,...d};});
  const line=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=`${pts[0].x},${base} ${line} ${pts[pts.length-1].x},${base}`;
  const bars=pts.map((p,i)=>{const bh=Math.max(4,base-p.y); const bx=p.x-19; const by=base-bh; return `<rect class="chart-bar" x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="38" height="${bh.toFixed(1)}" rx="12"></rect><text class="chart-axis" x="${p.x.toFixed(1)}" y="232" text-anchor="middle">${esc(p.label)}</text>`}).join('');
  const dots=pts.map(p=>`<circle class="chart-dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="6"></circle>`).join('');
  const best=pts.reduce((a,b)=>b.total>a.total?b:a,pts[0]);
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Grafik pendapatan 7 hari terakhir"><line class="chart-grid" x1="38" x2="662" y1="${base}" y2="${base}"></line><line class="chart-grid" x1="38" x2="662" y1="${top}" y2="${top}"></line><polygon class="chart-area" points="${area}"></polygon>${bars}<polyline class="chart-line" points="${line}"></polyline>${dots}<text class="chart-value" x="${best.x.toFixed(1)}" y="${Math.max(24,best.y-14).toFixed(1)}" text-anchor="middle">${esc(moneyShort(best.total))}</text></svg>`;
}

function defaultDoc(coll){

  }

function fieldHtml(f,item,isNew,coll){

  if(f.t==='select') return `<div class="field"><label>${f.l}</label><select id="${id}" class="select">${f.opts.map(o=>`<option value="${o}" ${String(v)===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  if(f.t==='user' || f.t==='userOptional') return `<div class="field"><label>${f.l}</label><select id="${id}" class="select"><option value="">${f.t==='userOptional'?'Global / kosong':'Pilih user'}</option>${activeUsers().map(u=>`<option value="${esc(u.username)}" ${cleanUser(v)===cleanUser(u.username)?'selected':''}>${esc(u.name)} (@${esc(u.username)})</option>`).join('')}</select></div>`;
  if(f.t==='json') return `<div class="field full"><label>${f.l}</label><textarea id="${id}" class="textarea">${esc(JSON.stringify(plain(v||{}),null,2))}</textarea></div>`;

async function saveEditor(coll,id=''){
  if(!isAdmin()) return toast('Hanya admin', true);
  const meta=metas[coll]; let data={};
  for(const f of meta.fields){
    const el=$('f_'+f.k); if(!el) continue;
    let v = el.value;
    if(f.t==='number') v = v==='' ? 0 : Number(v);
    if(f.t==='bool') v = v === 'true';
    if(f.t==='username') v = cleanUser(v);
    if(f.t==='user' || f.t==='userOptional') v = cleanUser(v);
    if(f.t==='json') { try{v=JSON.parse(v||'{}')}catch(e){return toast(`${f.l} bukan JSON valid`, true)} }
    if(f.req && (v==='' || v==null)) return toast(`${f.l} wajib diisi`, true);
    data[f.k]=v;
  }
  if(data.user && !data.name){ const u=userBy(data.user); if(u) data.name=u.name||u.username; }
  if(coll==='users') { data.username=cleanUser(data.username); data.dailyBonusRate = data.role==='harian' ? Number(data.dailyBonusPercent||0)/100 : 0; if(data.role!=='harian') data.dailyBonusPercent=0; }
  if(data.dateKey && !data.monthKey) data.monthKey=String(data.dateKey).slice(0,7);
  const docId = id || (coll==='users' ? data.username : (coll==='closings' ? (data.id || `${data.scope||'global'}_${data.user||'all'}_${data.dateKey||dateKey()}`) : null));
  if(!docId && meta.idMode!=='auto') return toast('Doc ID wajib diisi', true);
  const pin=prompt('Masukkan PIN admin untuk simpan:'); if(!pin) return; if(pin!==state.user.pin) return toast('PIN salah', true);
  loading(true); try{
    data.updatedAt=serverTimestamp(); data.updatedAtMs=Date.now(); data.updatedBy=state.user.username; data.updatedByName=state.user.name;
    if(!id){ data.createdAt=serverTimestamp(); data.createdAtMs=Date.now(); }
    if(coll==='transactions' && !data.note) data.note='Transaksi';
    if(coll==='closings') data.id=docId;
    if(meta.idMode==='auto' && !id) await addDoc(collection(db,coll),data); else await setDoc(doc(db,coll,docId),data,{merge:true});
    await logAudit(`monitor_${id?'update':'create'}_${coll}`,{collection:coll,id:docId||'(auto)'}); closeModal('editor'); toast('Data tersimpan');
  }catch(e){toast(e.message,true)} finally{loading(false)}
}
function openRaw(coll,id){
  const item=list(coll).find(x=>x.id===id); if(!item) return toast('Data tidak ditemukan', true);
  $('rawBody').innerHTML = `<div class="sheet-head"><h3>JSON ${metas[coll].label} / ${esc(id)}</h3><div class="spacer"></div><button class="btn icon" onclick="window.closeModal('rawModal')">×</button></div><textarea id="rawText" class="textarea" style="min-height:52vh">${esc(JSON.stringify(plain(item),null,2))}</textarea><p class="tiny" style="margin:8px 0">Timestamp disimpan sebagai <span class="kbd">{"__timestampMs":...}</span> dan akan dikembalikan ke Firestore Timestamp.</p><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="window.saveRaw('${coll}','${esc(id)}')">Simpan JSON</button><button class="btn" onclick="window.closeModal('rawModal')">Batal</button></div>`;
  $('rawModal').classList.add('show');
}
async function saveRaw(coll,id){
  if(!isAdmin()) return toast('Hanya admin', true);
  let data; try{data=revive(JSON.parse($('rawText').value))}catch(e){return toast('JSON tidak valid', true)}
  const pin=prompt('PIN admin untuk simpan JSON:'); if(!pin) return; if(pin!==state.user.pin) return toast('PIN salah', true);
  data.updatedAt=serverTimestamp(); data.updatedAtMs=Date.now(); data.updatedBy=state.user.username;
  loading(true); try{ await setDoc(doc(db,coll,id),data,{merge:false}); await logAudit(`monitor_raw_save_${coll}`,{collection:coll,id}); closeModal('rawModal'); toast('JSON tersimpan'); }catch(e){toast(e.message,true)} finally{loading(false)}
}
function closeModal(id){$(id).classList.remove('show')}

async function softDeleteDoc(coll,id){
  if(!isAdmin()) return toast('Hanya admin', true);
  if(!confirm(`Hapus aman ${metas[coll].label} ini?`)) return;
  const pin=prompt('PIN admin:'); if(!pin) return; if(pin!==state.user.pin) return toast('PIN salah', true);
  const patch = coll==='users' ? {active:false,deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username} : coll==='closings' ? {canceled:true,deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username} : {deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username,deletedByName:state.user.name};
  loading(true); try{await setDoc(doc(db,coll,id),patch,{merge:true}); await logAudit(`monitor_soft_delete_${coll}`,{collection:coll,id}); toast('Data dihapus aman')}catch(e){toast(e.message,true)}finally{loading(false)}
}
async function restoreDoc(coll,id){
  if(!isAdmin()) return toast('Hanya admin', true);
  const pin=prompt('PIN admin untuk restore:'); if(!pin) return; if(pin!==state.user.pin) return toast('PIN salah', true);
  const patch = coll==='users' ? {active:true,deleted:false,deletedAt:null,deletedAtMs:null} : coll==='closings' ? {canceled:false,deleted:false,deletedAt:null,deletedAtMs:null} : {deleted:false,deletedAt:null,deletedAtMs:null,deletedBy:null,deletedByName:null};
  loading(true); try{await setDoc(doc(db,coll,id),patch,{merge:true}); await logAudit(`monitor_restore_${coll}`,{collection:coll,id}); toast('Data direstore')}catch(e){toast(e.message,true)}finally{loading(false)}
}
async function hardDeleteDoc(coll,id){
  if(!isAdmin()) return toast('Hanya admin', true);
  const ok=prompt(`HAPUS PERMANEN ${metas[coll].label} ${id}? Ketik HAPUS:`); if(ok!=='HAPUS') return;
  const pin=prompt('PIN admin:'); if(!pin) return; if(pin!==state.user.pin) return toast('PIN salah', true);
  loading(true); try{await deleteDoc(doc(db,coll,id)); await logAudit(`monitor_hard_delete_${coll}`,{collection:coll,id}); toast('Data dihapus permanen')}catch(e){toast(e.message,true)}finally{loading(false)}
}
async function quickClosing(){
  if(!isAdmin()) return toast('Hanya admin', true);
  const d=dateKey(), id=`global_${d}`; if(list('closings').some(c=>c.id===id && c.canceled!==true)) return toast('Global hari ini sudah ada', true);
  const pin=prompt(`Closing global ${d}? PIN admin:`); if(!pin) return; if(pin!==state.user.pin) return toast('PIN salah', true);
  const nowTime=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  loading(true); try{await setDoc(doc(db,'closings',id),{id,scope:'global',user:null,name:null,dateKey:d,monthKey:monthKey(),closed:true,canceled:false,closedAt:serverTimestamp(),closedAtMs:Date.now(),closedBy:state.user.username,closedByName:state.user.name,actualClosingTime:nowTime,closingTime:nowTime,manualClosingTime:nowTime,deadline:SOURCE_CONST.closingDeadline,delayMinutes:0,bonusPerMinute:state.bonus.closingBonusPerMinute,bonusPerUser:0,totalUsers:0,totalBonus:0},{merge:true}); await logAudit('monitor_quick_closing',{id}); toast('Closing global dibuat')}catch(e){toast(e.message,true)}finally{loading(false)}
}
async function logAudit(action,detail={}){ try{ await addDoc(collection(db,'audit_logs'),{action,detail,actor:state.user?.username||'monitor',actorName:state.user?.name||'Monitor',createdAt:serverTimestamp(),createdAtMs:Date.now()}); }catch(e){console.warn('audit fail',e)} }
function exportCsv(coll,items){
  const rows=items.map(x=>plain(x)); const keys=[...new Set(rows.flatMap(o=>Object.keys(o)))];
  const csv=[keys.join(',')].concat(rows.map(o=>keys.map(k=>`"${String(typeof o[k]==='object'?JSON.stringify(o[k]):(o[k]??'')).replace(/"/g,'""')}"`).join(','))).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${coll}_${dateKey()}.csv`; a.click(); URL.revokeObjectURL(a.href);
}

window.openEditor=openEditor; window.openRaw=openRaw; window.saveEditor=saveEditor; window.saveRaw=saveRaw; window.closeModal=closeModal; window.softDeleteDoc=softDeleteDoc; window.restoreDoc=restoreDoc; window.hardDeleteDoc=hardDeleteDoc; window.quickClosing=quickClosing;

function postRenderBind(){ if(!state.user) return; if(state.page==='data') bindData(); if(state.page==='settings') bindSettings(); if(state.page==='logs') bindLogs(); }
const oldRender = render; render = function(){ oldRender(); postRenderBind(); };

document.documentElement.dataset.theme = localStorage.getItem('rocky_monitor_theme') || 'dark';
restoreSession(); if(!state.user) renderLogin();
</script>
</body>
</html>
