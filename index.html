    .bars{display:flex;align-items:end;gap:8px;height:150px;padding:12px 4px 2px}.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}.bar{width:100%;max-width:36px;min-height:8px;border-radius:999px 999px 7px 7px;background:linear-gradient(180deg,var(--accent2),var(--accent));box-shadow:0 10px 22px rgba(108,140,255,.25)}.bar-label{font-size:9px;color:var(--muted);font-weight:900}.bar-val{font-size:9px;color:var(--ghost);white-space:nowrap;max-width:42px;overflow:hidden;text-overflow:ellipsis}
    #bottom-nav{position:fixed;left:50%;bottom:calc(10px + var(--safe-bottom));transform:translateX(-50%);width:min(456px,calc(100% - 18px));height:72px;background:var(--nav);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:26px;display:none;align-items:center;justify-content:space-around;gap:4px;z-index:80;box-shadow:var(--shadow);padding:7px}.nav-item{height:56px;flex:1;border-radius:20px;background:transparent;color:var(--ghost);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:9px;font-weight:950;text-transform:uppercase;letter-spacing:.025em;transition:background .15s var(--ease),color .15s var(--ease),transform .15s var(--ease)}.nav-item:active{transform:scale(.96)}.nav-item i{font-size:20px}.nav-item.active{background:linear-gradient(135deg,var(--accentDim),rgba(142,216,255,.10));color:var(--accent2);box-shadow:inset 0 0 0 1px rgba(108,140,255,.17)}

    #toast{position:fixed;top:14px;left:50%;transform:translate(-50%,-8px) scale(.96);z-index:200;background:var(--surface);backdrop-filter:blur(18px);border:1px solid var(--border);box-shadow:var(--shadow);padding:10px 14px;border-radius:999px;max-width:calc(100% - 28px);font-size:12px;font-weight:900;color:var(--text);opacity:0;pointer-events:none;transition:.2s var(--ease)}#toast.show{opacity:1;transform:translate(-50%,0) scale(1)}#toast.err{color:var(--red);border-color:rgba(255,93,125,.28)}
    #loading{position:fixed;inset:0;background:rgba(5,8,15,.64);backdrop-filter:blur(14px);z-index:180;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}.ring{width:42px;height:42px;border-radius:999px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent2);animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 16px}.login-card{width:100%;max-width:420px}.login-logo{width:78px;height:78px;border-radius:28px;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent),var(--accent2) 52%,var(--accent3));color:white;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 18px 42px rgba(108,140,255,.32);position:relative;overflow:hidden}.login-logo:after{content:'';position:absolute;inset:2px;border-radius:26px;background:linear-gradient(145deg,rgba(255,255,255,.34),transparent 44%)}.login-logo i{position:relative;z-index:1}.login-title{text-align:center;font-size:26px;font-weight:950;letter-spacing:-.052em}.login-sub{text-align:center;font-size:12px;color:var(--muted);line-height:1.45;margin:6px 0 20px}

<body>
<div id="app">
  <div id="loading"><div class="ring"></div><div class="small bold muted">MEMPROSES</div></div>
  <div id="toast"></div>
  <div id="modal-root" class="modal-wrap"></div>
  <main id="page"></main>
  <button id="fab" class="fab" onclick="openTransactionModal()" aria-label="Tambah transaksi"><i class="fas fa-plus"></i></button>
  <nav id="bottom-nav">
    <button class="nav-item" id="nav-dashboard" onclick="go('dashboard')"><i class="fas fa-chart-pie"></i><span>Ringkas</span></button>
    <button class="nav-item" id="nav-transactions" onclick="go('transactions')"><i class="fas fa-receipt"></i><span>Transaksi</span></button>
    <button class="nav-item" id="nav-attendance" onclick="go('attendance')"><i class="fas fa-calendar-check"></i><span>Absen</span></button>
    <button class="nav-item" id="nav-users" onclick="go('users')"><i class="fas fa-users"></i><span>User</span></button>
    <button class="nav-item" id="nav-settings" onclick="go('settings')"><i class="fas fa-gear"></i><span>Setelan</span></button>
  </nav>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, enableIndexedDbPersistence, doc, getDoc, setDoc, addDoc, deleteDoc, collection, getDocs, onSnapshot, serverTimestamp, query, limit, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqmTEKnLKOXcmOoR9RrXksNe5_Fix42w8",
    authDomain: "rocky-fd14b.firebaseapp.com",
    projectId: "rocky-fd14b",
    storageBucket: "rocky-fd14b.firebasestorage.app",
    messagingSenderId: "861954349314",
    appId: "1:861954349314:web:bb8384825daedb8d34ca1b"
  };

  const SESSION_KEY = 'rocky_admin_separate_session_v1';
  const ADMIN_USERNAMES = ['admin'];
  const DEFAULT_TRANSACTION_BONUS_RATE = 0.015;
  const DEFAULT_CLOSING_BONUS_PER_MINUTE = 100;
  const CLOSING_DEADLINE_HOUR = 18;
  const CLOSING_DEADLINE_MINUTE = 0;
  const MAX_SYNC = 1800;

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  try { await enableIndexedDbPersistence(db); } catch (e) { console.log('offline cache skipped', e?.code || e?.message); }

  const $ = (id) => document.getElementById(id);
  const page = $('page');
  let currentUser = null;
  let currentPage = 'dashboard';
  let selectedUserFilter = 'all';
  let selectedDateFilter = todayKey();
  let selectedMonthFilter = monthKey();
  let logLimit = 60;
  let txLimit = 80;
  let attLimit = 80;
  let data = { users: [], transactions: [], attendance: [], closings: [], logs: [], bonus: { transactionBonusRate: DEFAULT_TRANSACTION_BONUS_RATE, closingBonusPerMinute: DEFAULT_CLOSING_BONUS_PER_MINUTE } };
  let unsubs = [];
  let busy = false;

  function setLoading(v){ busy = !!v; $('loading').style.display = v ? 'flex' : 'none'; }
  function toast(msg, err=false){ const el=$('toast'); el.textContent=msg; el.className = err ? 'show err' : 'show'; setTimeout(()=>{ el.className=''; }, 2300); }
  function escapeHtml(v){ return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function sanitizeUsername(v){ return String(v || '').trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\-.]/g,''); }
  function formatRp(v){ return Number(v || 0).toLocaleString('id-ID'); }
  function roleLabel(role){ const r=sanitizeUsername(role||'staff'); if(r==='admin') return 'Admin'; if(['harian','daily','karyawan_harian'].includes(r)) return 'Harian'; return 'Staff'; }
  function isAdminUser(u){ const username=sanitizeUsername(u?.username || u?.id || ''); const role=sanitizeUsername(u?.role || ''); return role === 'admin' || ADMIN_USERNAMES.includes(username); }
  function isActive(u){ return u && u.active !== false && u.deleted !== true && u.deleted !== 'true'; }
  function isDeleted(r){ return r?.deleted === true || r?.deleted === 'true'; }
  function isDaily(u){ const r = sanitizeUsername(typeof u === 'object' ? u?.role : getUser(u)?.role); return ['harian','daily','karyawan_harian'].includes(r); }
  function getUser(username){ const u=sanitizeUsername(username); return data.users.find(x => sanitizeUsername(x.username || x.id) === u); }
  function activeUsers(){ return data.users.filter(isActive).sort((a,b)=>String(a.name||a.username).localeCompare(String(b.name||b.username),'id')); }
  function staffUsers(){ return activeUsers().filter(u => !isAdminUser(u)); }
  function visibleTransactions(){ return data.transactions.filter(t => !isDeleted(t)); }
  function visibleAttendance(){ return data.attendance.filter(a => !isDeleted(a)); }
  function toMs(rec){ const raw = rec?.createdAtMs || rec?.closedAtMs || rec?.updatedAtMs || rec?.deletedAtMs || rec?.canceledAtMs || 0; if (Number(raw)) return Number(raw); const t = rec?.createdAt || rec?.closedAt || rec?.updatedAt || rec?.deletedAt || rec?.canceledAt; if (t?.toMillis) return t.toMillis(); if (t?.seconds) return t.seconds * 1000; const p = Date.parse(String(t || '')); return Number.isFinite(p) ? p : 0; }
  function sortDesc(list){ return [...list].sort((a,b)=>toMs(b)-toMs(a)); }
  function getJakartaParts(date=new Date()){ const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jakarta',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}).formatToParts(date); return Object.fromEntries(parts.map(p=>[p.type,p.value])); }
  function todayKey(date=new Date()){ const p=getJakartaParts(date); return `${p.year}-${p.month}-${p.day}`; }
  function monthKey(date=new Date()){ return todayKey(date).slice(0,7); }
  function timeLabel(date=new Date()){ const p=getJakartaParts(date); return `${p.hour}:${p.minute}`; }
  function dateLabel(key){ if(!key) return '-'; const [y,m,d]=String(key).split('-'); return `${d}/${m}/${y}`; }
  function txDate(t){ return String(t?.dateKey || (toMs(t) ? todayKey(new Date(toMs(t))) : '')).slice(0,10); }
  function txMonth(t){ return String(t?.monthKey || txDate(t).slice(0,7)); }
  function attDate(a){ return String(a?.dateKey || (toMs(a) ? todayKey(new Date(toMs(a))) : '')).slice(0,10); }
  function dateAddKey(offset){ const now = new Date(); const jakartaNoonUTC = Date.UTC(Number(getJakartaParts(now).year), Number(getJakartaParts(now).month)-1, Number(getJakartaParts(now).day), 5, 0, 0); return todayKey(new Date(jakartaNoonUTC + offset*86400000)); }
  function shortDay(key){ const d = new Date(`${key}T00:00:00+07:00`); return new Intl.DateTimeFormat('id-ID',{weekday:'short',timeZone:'Asia/Jakarta'}).format(d); }
  function getBonusRate(username){ const u=getUser(username); if(isDaily(u)){ const byRate=Number(u?.dailyBonusRate); if(Number.isFinite(byRate) && byRate>=0) return byRate; const byPercent=Number(u?.dailyBonusPercent); if(Number.isFinite(byPercent) && byPercent>=0) return byPercent/100; } const r=Number(data.bonus?.transactionBonusRate); return Number.isFinite(r) && r>=0 ? r : DEFAULT_TRANSACTION_BONUS_RATE; }
  function calcTxBonus(list){ return Math.round((list||[]).reduce((sum,t)=>sum + Number(t.amount||0)*getBonusRate(t.user),0)); }
  function closingDocId(dateKey, username=null){ return username ? `${dateKey}_${sanitizeUsername(username)}` : dateKey; }
  function todayGlobalClosing(){ const today=todayKey(); return data.closings.find(c => c.id !== '__bonus_settings' && c.closed === true && c.dateKey === today && (!c.user || c.scope === 'global') && c.canceled !== true); }
  function todayUserClosing(username){ const u=sanitizeUsername(username); const today=todayKey(); return data.closings.find(c => c.id !== '__bonus_settings' && c.closed === true && c.dateKey === today && sanitizeUsername(c.user) === u && c.canceled !== true); }
  function closingDelayMinutes(date=new Date()){ const p=getJakartaParts(date); const nowMin=Number(p.hour)*60+Number(p.minute); const deadline=CLOSING_DEADLINE_HOUR*60+CLOSING_DEADLINE_MINUTE; return Math.max(0, nowMin-deadline); }
  function delayFromTime(label){ const m=String(label||'').match(/^(\d{1,2}):(\d{2})$/); if(!m) return null; const h=Number(m[1]), min=Number(m[2]); if(h<0||h>23||min<0||min>59) return null; return Math.max(0,h*60+min-(CLOSING_DEADLINE_HOUR*60+CLOSING_DEADLINE_MINUTE)); }
  function inputDateHtml(id, value){ return `<input id="${id}" type="date" value="${escapeHtml(value || todayKey())}">`; }

  function dashboardMetrics(){
    const today=todayKey(), month=monthKey();
    const tx=visibleTransactions();
    const todayTx=tx.filter(t=>txDate(t)===today);
    const monthTx=tx.filter(t=>txMonth(t)===month);
    const todayAmount=todayTx.reduce((a,t)=>a+Number(t.amount||0),0);
    const monthAmount=monthTx.reduce((a,t)=>a+Number(t.amount||0),0);
    const todayAtt=visibleAttendance().filter(a=>attDate(a)===today);
    const monthBonus=calcTxBonus(monthTx) + monthlyClosingBonus('all', month);
    return { todayTx, monthTx, todayAmount, monthAmount, todayAtt, monthBonus };
  }
  function monthlyClosingBonus(username='all', month=monthKey()){
    return data.closings.filter(c=>c.closed===true && c.canceled!==true && String(c.monthKey || c.dateKey || '').startsWith(month)).reduce((sum,c)=>{
      if(username && username!=='all'){ return sum + Number(c?.bonusByUser?.[sanitizeUsername(username)] || 0); }
      if(c.bonusByUser && Object.keys(c.bonusByUser).length) return sum + Object.values(c.bonusByUser).reduce((a,b)=>a+Number(b||0),0);
      return sum + Number(c.totalBonus || 0);
    },0);
  }
  function renderSevenDayChart(){
    const tx=visibleTransactions();
    const days = Array.from({length:7},(_,i)=>dateAddKey(i-6));
    const totals = days.map(k=>tx.filter(t=>txDate(t)===k).reduce((a,t)=>a+Number(t.amount||0),0));
    const max = Math.max(...totals, 1);
    return `<div class="card"><div class="row-between"><div class="section-title" style="margin:0">Grafik 7 Hari Terakhir</div><span class="pill blue">Omzet</span></div><div class="bars">${days.map((d,i)=>`<div class="bar-col"><div class="bar-val">${totals[i] ? Math.round(totals[i]/1000)+'k' : '0'}</div><div class="bar" style="height:${Math.max(8,Math.round((totals[i]/max)*112))}px"></div><div class="bar-label">${shortDay(d)}</div></div>`).join('')}</div></div>`;
  }

  async function saveTransaction(id=''){

      const payload={ user:username, name:u.name||username, note, amount, dateKey:date, monthKey:date.slice(0,7), updatedAt:serverTimestamp(), updatedAtMs:Date.now(), updatedBy:currentUser.username, updatedByName:currentUser.name, deleted:false };

      else { await addDoc(collection(db,'transactions'), {...payload, createdAt:serverTimestamp(), createdAtMs:Date.now(), createdBy:currentUser.username, createdByName:currentUser.name}); await logAudit('transaction_add',{user:username,amount,note}); toast('✓ Transaksi ditambahkan'); }

  function renderAttendance(){
    const att = visibleAttendance().filter(a => (selectedUserFilter==='all' || sanitizeUsername(a.user)===selectedUserFilter) && (!selectedDateFilter || attDate(a)===selectedDateFilter)); const shown=att.slice(0,attLimit);
    page.innerHTML = `${topbar('Absen','Pantau dan kelola absensi')}<div class="grid2"><div class="stat"><div class="stat-label">Absen Filter</div><div class="stat-val">${att.length}</div><div class="stat-foot">${dateLabel(selectedDateFilter)}</div></div><div class="stat"><div class="stat-label">Belum Absen</div><div class="stat-val">${Math.max(0,staffUsers().length - visibleAttendance().filter(a=>attDate(a)===todayKey()).map(a=>sanitizeUsername(a.user)).filter((v,i,arr)=>arr.indexOf(v)===i).length)}</div><div class="stat-foot">Hari ini</div></div></div><div class="filters" style="margin-top:10px"><select id="att-user-filter" onchange="selectedUserFilter=this.value;render()">${userOptions(selectedUserFilter,true)}</select>${inputDateHtml('att-date-filter',selectedDateFilter)}</div><button class="btn btn-primary btn-block" onclick="openAttendanceModal()"><i class="fas fa-plus"></i> Tambah Absen Manual</button><div class="list" style="margin-top:10px">${shown.length?shown.map(renderAttendanceItem).join(''):'<div class="empty">Data absen belum ada.</div>'}</div>${att.length>shown.length?`<button class="btn btn-block" style="margin-top:10px" onclick="attLimit+=50;render()">Tampilkan Lagi</button>`:''}`;
    setTimeout(()=>{ const el=$('att-date-filter'); if(el) el.onchange=()=>{selectedDateFilter=el.value;render();}; },0);
  }
  function renderAttendanceItem(a){ const u=getUser(a.user); return `<div class="item"><div class="avatar"><i class="fas fa-calendar-check"></i></div><div class="item-main"><div class="item-title">${escapeHtml(u?.name || a.name || a.user || '-')}</div><div class="item-sub">${dateLabel(attDate(a))} · ${timeFromMs(toMs(a))}${a.lat?` · GPS ${escapeHtml(a.lat)}, ${escapeHtml(a.lng)}`:''}</div></div><div class="actions"><button class="icon-btn" onclick="openAttendanceModal('${escapeHtml(a.id)}')"><i class="fas fa-pen"></i></button><button class="icon-btn" style="color:var(--red)" onclick="deleteAttendance('${escapeHtml(a.id)}')"><i class="fas fa-trash"></i></button></div></div>`; }
  function openAttendanceModal(id=''){ const a=id?data.attendance.find(x=>x.id===id):null; const body=`<div class="field"><div class="label">User</div><select id="abs-user">${userOptions(sanitizeUsername(a?.user||selectedUserFilter||''),false)}</select></div><div class="field"><div class="label">Tanggal</div><input id="abs-date" type="date" value="${escapeHtml(a?attDate(a):todayKey())}"></div><div class="field"><div class="label">Jam WIB</div><input id="abs-time" type="time" value="${escapeHtml(a?timeFromMs(toMs(a)):timeLabel())}"></div><div class="hint">Absen manual dari admin akan tersimpan di collection attendance.</div>`; openModal(id?'Edit Absen':'Tambah Absen', body, `<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveAttendance('${escapeHtml(id)}')">Simpan</button>`); }
  async function saveAttendance(id=''){ const username=sanitizeUsername($('abs-user')?.value); const u=getUser(username); const date=String($('abs-date')?.value||todayKey()).slice(0,10); const jam=String($('abs-time')?.value||timeLabel()).slice(0,5); if(!username||!u) return toast('Pilih user dulu',true); if(id && !(await requirePin('Simpan edit absen?'))) return; const ms=Date.parse(`${date}T${jam}:00+07:00`); setLoading(true); try{ const payload={user:username,name:u.name||username,dateKey:date,createdAt:Timestamp.fromMillis(ms),createdAtMs:ms,manual:true,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:currentUser.username,deleted:false}; if(id){ await setDoc(doc(db,'attendance',id),payload,{merge:true}); await logAudit('attendance_edit',{id,user:username,dateKey:date}); toast('✓ Absen diperbarui'); } else { await addDoc(collection(db,'attendance'),{...payload,createdBy:currentUser.username}); await logAudit('attendance_add',{user:username,dateKey:date}); toast('✓ Absen ditambahkan'); } closeModal(); }catch(e){console.error(e);toast('Gagal simpan absen',true);} setLoading(false); }
  async function deleteAttendance(id){ const a=data.attendance.find(x=>x.id===id); if(!a) return toast('Absen tidak ditemukan',true); if(!(await requirePin(`Hapus absen ${a.name || a.user}?`))) return; setLoading(true); try{ await setDoc(doc(db,'attendance',id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:currentUser.username},{merge:true}); await logAudit('attendance_delete',{id,user:a.user,dateKey:attDate(a)}); toast('✓ Absen dihapus'); }catch(e){console.error(e);toast('Gagal hapus absen',true);} setLoading(false); }

  function renderUsers(){
    const users=activeUsers();
    page.innerHTML = `${topbar('User','Tambah, edit, nonaktifkan user')}<div class="grid2"><div class="stat"><div class="stat-label">Total Aktif</div><div class="stat-val">${users.length}</div><div class="stat-foot">Termasuk admin</div></div><div class="stat"><div class="stat-label">Staff</div><div class="stat-val">${staffUsers().length}</div><div class="stat-foot">Staff + harian</div></div></div><button class="btn btn-primary btn-block" style="margin-top:10px" onclick="openUserModal()"><i class="fas fa-user-plus"></i> Tambah User</button><div class="list" style="margin-top:10px">${users.map(renderUserItem).join('') || '<div class="empty">Belum ada user.</div>'}</div>`;
  }
  function renderUserItem(u){ const username=sanitizeUsername(u.username||u.id); return `<div class="item"><div class="avatar"><i class="fas ${isAdminUser(u)?'fa-user-shield':'fa-user'}"></i></div><div class="item-main"><div class="item-title">${escapeHtml(u.name||username)}</div><div class="item-sub">@${escapeHtml(username)} · ${roleLabel(u.role)} · PIN ${String(u.pin||'').replace(/./g,'•')}</div></div><span class="pill ${isAdminUser(u)?'blue':isDaily(u)?'warn':'ok'}">${roleLabel(u.role)}</span><div class="actions"><button class="icon-btn" onclick="openUserModal('${escapeHtml(username)}')"><i class="fas fa-pen"></i></button><button class="icon-btn" style="color:var(--red)" onclick="deactivateUser('${escapeHtml(username)}')"><i class="fas fa-user-slash"></i></button></div></div>`; }
  function openUserModal(username=''){ const u=username?getUser(username):null; const editing=!!u; const body=`<div class="field"><div class="label">Username</div><input id="user-username" value="${escapeHtml(u?.username||username||'')}" ${editing?'disabled':''} placeholder="contoh: aji"></div><div class="field"><div class="label">Nama</div><input id="user-name" value="${escapeHtml(u?.name||'')}" placeholder="Nama user"></div><div class="field"><div class="label">PIN</div><input id="user-pin" type="text" inputmode="numeric" pattern="[0-9]*" value="${escapeHtml(u?.pin||'')}" placeholder="123456"></div><div class="field"><div class="label">Role</div><select id="user-role"><option value="staff" ${sanitizeUsername(u?.role||'staff')==='staff'?'selected':''}>Staff</option><option value="harian" ${isDaily(u)?'selected':''}>Karyawan Harian</option><option value="admin" ${isAdminUser(u)?'selected':''}>Admin</option></select></div><div class="field"><div class="label">Bonus Harian %</div><input id="user-daily-bonus" type="text" inputmode="decimal" value="${escapeHtml(Number(u?.dailyBonusPercent || (Number(u?.dailyBonusRate||0)*100) || 0))}" placeholder="Contoh 1.5"></div><label class="row" style="margin-top:3px"><input id="user-active" type="checkbox" ${isActive(u||{active:true})?'checked':''} style="width:20px;min-height:20px"> <span class="small bold">User aktif</span></label>`; openModal(editing?'Edit User':'Tambah User', body, `<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveUser('${escapeHtml(username)}')">Simpan</button>`, 'Edit user muncul sebagai popup di tengah layar.'); }
  async function saveUser(oldUsername=''){ const username=sanitizeUsername($('user-username')?.value); const name=String($('user-name')?.value||'').trim(); const pin=String($('user-pin')?.value||'').replace(/\D/g,''); const role=sanitizeUsername($('user-role')?.value||'staff'); const dailyPercent=Number(String($('user-daily-bonus')?.value||'0').replace(',','.')); const active=$('user-active')?.checked!==false; if(!username||!name||!pin) return toast('Username, nama, dan PIN wajib diisi',true); if(pin.length<3) return toast('PIN minimal 3 angka',true); if(oldUsername && !(await requirePin(`Simpan edit user @${username}?`))) return; setLoading(true); try{ await setDoc(doc(db,'users',username),{username,name,pin,role,dailyBonusPercent:Number.isFinite(dailyPercent)?dailyPercent:0,dailyBonusRate:(Number.isFinite(dailyPercent)?dailyPercent:0)/100,active,deleted:false,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:currentUser.username,...(!oldUsername?{createdAt:serverTimestamp(),createdAtMs:Date.now(),createdBy:currentUser.username}:{})},{merge:true}); await logAudit(oldUsername?'user_edit':'user_add',{username,role,active}); toast(oldUsername?'✓ User diperbarui':'✓ User ditambahkan'); closeModal(); }catch(e){console.error(e);toast('Gagal simpan user',true);} setLoading(false); }
  async function deactivateUser(username){ const u=getUser(username); if(!u) return toast('User tidak ditemukan',true); if(sanitizeUsername(username)===sanitizeUsername(currentUser.username)) return toast('Tidak bisa nonaktifkan akun sendiri',true); if(!(await requirePin(`Nonaktifkan user @${username}?`))) return; const ok=await askConfirm('Nonaktifkan User', `User ${u.name || username} tidak bisa login setelah dinonaktifkan.`, true); if(!ok) return; setLoading(true); try{ await setDoc(doc(db,'users',sanitizeUsername(username)),{active:false,deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:currentUser.username},{merge:true}); await logAudit('user_deactivate',{username}); toast('✓ User dinonaktifkan'); }catch(e){console.error(e);toast('Gagal nonaktifkan user',true);} setLoading(false); }

  function renderSettings(){
    const logs=data.logs.slice(0,logLimit);
    page.innerHTML = `${topbar('Pengaturan','Bonus, backup data, dan log')}<div class="card"><div class="section-title">Bonus</div><div class="field"><div class="label">Bonus Transaksi (%)</div><input id="bonus-trx" type="text" inputmode="decimal" value="${escapeHtml(Number((Number(data.bonus.transactionBonusRate||0)*100).toFixed(3)))}"></div><div class="field"><div class="label">Bonus Closing / Menit</div><input id="bonus-closing" type="text" inputmode="numeric" value="${escapeHtml(data.bonus.closingBonusPerMinute || 0)}"></div><button class="btn btn-primary btn-block" onclick="saveBonusSettings()"><i class="fas fa-floppy-disk"></i> Simpan Bonus</button></div><div class="card" style="margin-top:10px"><div class="section-title">Backup Semua Data</div><div class="sub" style="margin-bottom:10px">Backup berisi users, absen, transaksi, closing, bonus settings, dan audit log.</div><div class="grid2"><button class="btn btn-success" onclick="backupAllData('json')"><i class="fas fa-file-code"></i> JSON</button><button class="btn btn-success" onclick="backupAllData('excel')"><i class="fas fa-file-excel"></i> Excel</button></div></div><div class="card" style="margin-top:10px"><div class="row-between"><div><div class="section-title" style="margin:0">Audit Log</div><div class="sub">${data.logs.length} log terbaca</div></div><button class="btn btn-danger btn-sm" onclick="clearLogs()"><i class="fas fa-broom"></i> Clear Log</button></div><div class="list" style="margin-top:10px">${logs.length?logs.map(renderLogItem).join(''):'<div class="empty">Belum ada log.</div>'}</div>${data.logs.length>logs.length?`<button class="btn btn-block" style="margin-top:10px" onclick="logLimit+=60;render()">Tampilkan Lagi</button>`:''}</div><div class="card" style="margin-top:10px"><div class="section-title">Data Terhapus</div><div class="grid2"><div class="stat"><div class="stat-label">Transaksi Hapus</div><div class="stat-val">${data.transactions.filter(isDeleted).length}</div><div class="stat-foot">Masuk backup</div></div><div class="stat"><div class="stat-label">Absen Hapus</div><div class="stat-val">${data.attendance.filter(isDeleted).length}</div><div class="stat-foot">Masuk backup</div></div></div></div>`;
  }
  function renderLogItem(l){ return `<div class="item"><div class="avatar"><i class="fas fa-clock-rotate-left"></i></div><div class="item-main"><div class="item-title">${escapeHtml(l.action || '-')}</div><div class="item-sub">${escapeHtml(l.name || l.username || '-')} · ${dateLabel(todayKey(new Date(toMs(l)||Date.now())))} ${timeFromMs(toMs(l))}</div></div></div>`; }
  async function saveBonusSettings(){ const trxPercent=Number(String($('bonus-trx')?.value||'0').replace(',','.')); const closePerMin=Number(String($('bonus-closing')?.value||'0').replace(/\D/g,'')); if(!Number.isFinite(trxPercent)||trxPercent<0||trxPercent>100) return toast('Bonus transaksi tidak valid',true); if(!Number.isFinite(closePerMin)||closePerMin<0) return toast('Bonus closing tidak valid',true); if(!(await requirePin('Simpan pengaturan bonus?'))) return; setLoading(true); try{ await setDoc(doc(db,'closings','__bonus_settings'),{id:'__bonus_settings',dateKey:'__bonus_settings',type:'bonus_settings',closed:false,transactionBonusRate:trxPercent/100,transactionBonusPercent:trxPercent,closingBonusPerMinute:closePerMin,updatedAt:serverTimestamp(),updatedAtMs:Date.now(),updatedBy:currentUser.username,updatedByName:currentUser.name},{merge:true}); await logAudit('bonus_settings_update',{transactionBonusPercent:trxPercent,closingBonusPerMinute:closePerMin}); toast('✓ Bonus disimpan'); }catch(e){console.error(e);toast('Gagal simpan bonus',true);} setLoading(false); }

  async function doClosing(){ const target=sanitizeUsername($('closing-target')?.value||'global'); const username=target==='global'?null:target; const u=username?getUser(username):null; const today=todayKey(); if(username && !u) return toast('Target user tidak ditemukan',true); if(username?todayUserClosing(username):todayGlobalClosing()) return toast('Target sudah closing hari ini',true); if(!(await requirePin(`Closing ${username?(u.name||username):'SEMUA STAFF'} tanggal ${today}?`))) return; const delay=closingDelayMinutes(); const bonusValue=delay*Number(data.bonus.closingBonusPerMinute||0); const eligible=(username?[u]:staffUsers()).filter(x=>!isAdminUser(x)&&!isDaily(x)&&visibleAttendance().some(a=>attDate(a)===today && sanitizeUsername(a.user)===sanitizeUsername(x.username||x.id))); const bonusByUser=Object.fromEntries(eligible.map(x=>[sanitizeUsername(x.username||x.id),bonusValue])); const ok=await askConfirm('Closing Transaksi', `Lewat deadline ${delay} menit. Bonus Rp ${formatRp(bonusValue)} per user. User dapat bonus: ${eligible.length}.`, false); if(!ok) return; setLoading(true); try{ const id=closingDocId(today,username); await setDoc(doc(db,'closings',id),{id,closed:true,scope:username?'user':'global',user:username||null,name:u?.name||null,dateKey:today,monthKey:monthKey(),closedAt:serverTimestamp(),closedAtMs:Date.now(),closedBy:currentUser.username,closedByName:currentUser.name,actualClosingTime:timeLabel(),closingTime:timeLabel(),manualClosingTime:timeLabel(),canceled:false,canceledAtMs:null,deadline:'18:00',delayMinutes:delay,bonusPerMinute:Number(data.bonus.closingBonusPerMinute||0),bonusPerUser:bonusValue,bonusByUser,totalUsers:eligible.length,totalBonus:Object.values(bonusByUser).reduce((a,b)=>a+Number(b||0),0)},{merge:true}); await logAudit('closing_day',{dateKey:today,scope:username?'user':'global',user:username,delayMinutes:delay,bonusPerUser:bonusValue,totalUsers:eligible.length}); toast('✓ Closing berhasil'); }catch(e){console.error(e);toast('Gagal closing',true);} setLoading(false); }
  async function editClosingTime(){ const target=sanitizeUsername($('closing-target')?.value||'global'); const username=target==='global'?null:target; const c=username?todayUserClosing(username):todayGlobalClosing(); if(!c) return toast('Belum closing',true); const body=`<div class="field"><div class="label">Jam Closing WIB</div><input id="edit-closing-time" type="time" value="${escapeHtml(c.manualClosingTime || c.closingTime || timeLabel())}"></div><div class="hint">Bonus closing akan dihitung ulang dari batas 18:00.</div>`; openModal('Edit Jam Closing',body,`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveClosingTime('${escapeHtml(c.id)}')">Simpan</button>`); }
  async function saveClosingTime(id){ const val=String($('edit-closing-time')?.value||'').slice(0,5); const delay=delayFromTime(val); if(delay===null) return toast('Format jam tidak valid',true); if(!(await requirePin('Simpan edit jam closing?'))) return; const c=data.closings.find(x=>x.id===id); const username=sanitizeUsername(c?.user||''); const bonusValue=delay*Number(data.bonus.closingBonusPerMinute||0); const date=c?.dateKey||todayKey(); const eligible=(username?[getUser(username)].filter(Boolean):staffUsers()).filter(x=>!isAdminUser(x)&&!isDaily(x)&&visibleAttendance().some(a=>attDate(a)===date && sanitizeUsername(a.user)===sanitizeUsername(x.username||x.id))); const bonusByUser=Object.fromEntries(eligible.map(x=>[sanitizeUsername(x.username||x.id),bonusValue])); setLoading(true); try{ await setDoc(doc(db,'closings',id),{manualClosingTime:val,closingTime:val,delayMinutes:delay,bonusPerUser:bonusValue,bonusByUser,totalUsers:eligible.length,totalBonus:Object.values(bonusByUser).reduce((a,b)=>a+Number(b||0),0),editedAt:serverTimestamp(),editedAtMs:Date.now(),editedBy:currentUser.username,editedByName:currentUser.name},{merge:true}); await logAudit('closing_time_edit',{id,dateKey:date,closingTime:val,delayMinutes:delay}); closeModal(); toast('✓ Jam closing diperbarui'); }catch(e){console.error(e);toast('Gagal edit closing',true);} setLoading(false); }
  async function cancelClosing(){ const target=sanitizeUsername($('closing-target')?.value||'global'); const username=target==='global'?null:target; const c=username?todayUserClosing(username):todayGlobalClosing(); if(!c) return toast('Belum closing',true); if(!(await requirePin(`Batal closing ${username || 'global'}?`))) return; const ok=await askConfirm('Batal Closing','Transaksi akan dibuka lagi untuk target ini, dan bonus closing menjadi 0.',true); if(!ok) return; setLoading(true); try{ await setDoc(doc(db,'closings',c.id),{closed:false,canceled:true,canceledAt:serverTimestamp(),canceledAtMs:Date.now(),canceledBy:currentUser.username,canceledByName:currentUser.name,totalBonus:0,bonusPerUser:0,bonusByUser:{}},{merge:true}); await logAudit('closing_cancel',{id:c.id,dateKey:c.dateKey,user:username}); toast('✓ Closing dibatalkan'); }catch(e){console.error(e);toast('Gagal batal closing',true);} setLoading(false); }

  function plainValue(v){ if(v?.toDate) return v.toDate().toISOString(); if(v?.seconds) return new Date(v.seconds*1000).toISOString(); if(Array.isArray(v)) return v.map(plainValue); if(v && typeof v==='object'){ return Object.fromEntries(Object.entries(v).map(([k,val])=>[k,plainValue(val)])); } return v; }
  async function readCollection(name){ const snap=await getDocs(collection(db,name)); return snap.docs.map(d=>({id:d.id,...plainValue(d.data())})); }
  function downloadBlob(name, type, content){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
  async function backupAllData(format='json'){ if(!(await requirePin('Backup semua data aplikasi?'))) return; setLoading(true); try{ const backup={version:'admin-separate-app-v1',exportedAt:new Date().toISOString(),exportedBy:currentUser?.username||'admin',data:{users:await readCollection('users'),attendance:await readCollection('attendance'),transactions:await readCollection('transactions'),closings:await readCollection('closings'),audit_logs:await readCollection('audit_logs')}}; const stamp=todayKey()+ '_' + timeLabel().replace(':',''); if(format==='excel'){ if(!window.XLSX) throw new Error('XLSX belum siap'); const wb=XLSX.utils.book_new(); Object.entries(backup.data).forEach(([name,rows])=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.map(plainValue)),name.slice(0,31))); XLSX.writeFile(wb,`rocky_admin_backup_${stamp}.xlsx`); } else { downloadBlob(`rocky_admin_backup_${stamp}.json`,'application/json',JSON.stringify(backup,null,2)); } await logAudit('backup_all_data',{format,users:backup.data.users.length,attendance:backup.data.attendance.length,transactions:backup.data.transactions.length,closings:backup.data.closings.length,logs:backup.data.audit_logs.length}); toast('✓ Backup selesai'); }catch(e){console.error(e);toast(e.message || 'Gagal backup',true);} setLoading(false); }
  async function clearLogs(){ if(!(await requirePin('Clear semua audit log?'))) return; const ok=await askConfirm('Clear Log','Semua dokumen di audit_logs akan dihapus permanen. Backup dulu kalau perlu.',true); if(!ok) return; setLoading(true); try{ const snap=await getDocs(collection(db,'audit_logs')); await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'audit_logs',d.id)))); toast('✓ Log dibersihkan'); }catch(e){console.error(e);toast('Gagal clear log',true);} setLoading(false); }

  async function login(){ const username=sanitizeUsername($('login-username')?.value); const pin=String($('login-pin')?.value||'').trim(); if(!username||!pin) return toast('Lengkapi username dan PIN',true); setLoading(true); try{ const snap=await getDoc(doc(db,'users',username)); if(!snap.exists()) throw new Error('User tidak ditemukan'); const u={id:snap.id,...snap.data(),username:snap.data().username||snap.id}; if(!isActive(u)) throw new Error('User nonaktif'); if(String(u.pin||'')!==pin) throw new Error('PIN salah'); if(!isAdminUser(u)) throw new Error('Aplikasi ini khusus admin. Staff tidak bisa masuk.'); currentUser={username:sanitizeUsername(u.username||u.id),name:u.name||u.username,pin:String(u.pin||''),role:u.role||'admin'}; localStorage.setItem(SESSION_KEY,JSON.stringify(currentUser)); bindRealtime(); currentPage='dashboard'; toast(`✓ Masuk sebagai ${currentUser.name}`); render(); }catch(e){toast(e.message||'Login gagal',true);} setLoading(false); }
  async function logout(){ const ok=await askConfirm('Keluar','Logout dari aplikasi admin?',false); if(!ok) return; localStorage.removeItem(SESSION_KEY); currentUser=null; resetSubs(); renderLogin(); toast('✓ Logout'); }
  function restoreSession(){ try{ const raw=localStorage.getItem(SESSION_KEY); if(!raw) return false; currentUser=JSON.parse(raw); if(!isAdminUser(currentUser)) throw new Error('not admin'); bindRealtime(); return true; }catch(e){ localStorage.removeItem(SESSION_KEY); return false; } }
  function toggleTheme(){ const root=document.documentElement; const next=root.getAttribute('data-theme')==='dark'?'light':'dark'; root.setAttribute('data-theme',next); localStorage.setItem('rocky_admin_theme',next); }
  function render(){ if(!currentUser){ renderLogin(); return; } updateNav(); if(currentPage==='dashboard') renderDashboard(); else if(currentPage==='transactions') renderTransactions(); else if(currentPage==='attendance') renderAttendance(); else if(currentPage==='users') renderUsers(); else if(currentPage==='settings') renderSettings(); updateNav(); }

  window.go=go; window.login=login; window.logout=logout; window.toggleTheme=toggleTheme; window.closeModal=closeModal; window.openTransactionModal=openTransactionModal; window.saveTransaction=saveTransaction; window.deleteTransaction=deleteTransaction; window.openAttendanceModal=openAttendanceModal; window.saveAttendance=saveAttendance; window.deleteAttendance=deleteAttendance; window.openUserModal=openUserModal; window.saveUser=saveUser; window.deactivateUser=deactivateUser; window.saveBonusSettings=saveBonusSettings; window.backupAllData=backupAllData; window.clearLogs=clearLogs; window.doClosing=doClosing; window.editClosingTime=editClosingTime; window.saveClosingTime=saveClosingTime; window.cancelClosing=cancelClosing; window.selectedUserFilter=selectedUserFilter; window.render=render;
  Object.defineProperty(window,'selectedUserFilter',{get:()=>selectedUserFilter,set:v=>{selectedUserFilter=v;}});

  document.documentElement.setAttribute('data-theme', localStorage.getItem('rocky_admin_theme') || 'dark');
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
  if(!restoreSession()) renderLogin(); else render();
</script>
</body>
